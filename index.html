<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kalkulyator</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kalkulyator">
  <meta name="theme-color" content="#0d1117">
  <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <meta name="application-name" content="Kalkulyator">
  <meta name="msapplication-TileColor" content="#0d1117">
  <meta name="msapplication-TileImage" content="/icon-192.png">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    input, select { -webkit-user-select: text; user-select: text; }
    button { touch-action: manipulation; -webkit-user-select: none; user-select: none; }

    html {
      height: 100%;
      height: -webkit-fill-available;
      overflow: hidden;
      background: #0d1117;
    }
    html.light { background: #e8eaf6; }

    body {
      height: 100vh;
      height: 100dvh;
      height: -webkit-fill-available;
      overflow: hidden;
      overscroll-behavior: none;
      position: fixed;
      inset: 0;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
    }
    body.dark {
      --calc-bg: rgba(14,18,28,0.52);
      --btn-num: rgba(48,52,66,0.88);
      --btn-gray: rgba(162,162,172,0.92);
      --btn-orange: #ff9500;
      --text-main: #ffffff;
      --text-dim: rgba(255,255,255,0.36);
      --mode-bg: rgba(255,255,255,0.07);
      --shine: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.1);
      --box-bg: rgba(255,255,255,0.055);
      --input-bg: rgba(255,255,255,0.07);
      --input-border: rgba(255,255,255,0.12);
      --label: rgba(255,255,255,0.36);
      --nav-bg: rgba(10,14,22,0.82);
    }
    body.light {
      --calc-bg: rgba(248,250,255,0.62);
      --btn-num: rgba(210,213,224,0.94);
      --btn-gray: rgba(190,193,200,0.96);
      --btn-orange: #ff9500;
      --text-main: #1c1c1e;
      --text-dim: rgba(0,0,0,0.32);
      --mode-bg: rgba(0,0,0,0.055);
      --shine: rgba(255,255,255,0.55);
      --border: rgba(0,0,0,0.1);
      --box-bg: rgba(0,0,0,0.04);
      --input-bg: rgba(0,0,0,0.055);
      --input-border: rgba(0,0,0,0.12);
      --label: rgba(0,0,0,0.36);
      --nav-bg: rgba(225,228,240,0.88);
    }

    /* ── CALCULATOR SHELL ── */
    .calc {
      width: 100%;
      height: 100%;
      background: transparent;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Orqa fon — doim ko'rinib turadi */
    .calc-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    body.dark .calc-bg {
      background: linear-gradient(145deg, #0d1117 0%, #0f1d2e 50%, #0a1628 100%);
    }
    body.light .calc-bg {
      background: linear-gradient(145deg, #e8eaf6 0%, #c5cae9 50%, #9fa8da 100%);
    }

    /* Orqa fon dekor nurlari */
    .calc-bg::before {
      content: '';
      position: absolute;
      width: 340px; height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(80,160,255,0.18) 0%, transparent 70%);
      top: -80px; left: -80px;
    }
    .calc-bg::after {
      content: '';
      position: absolute;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(160,80,255,0.14) 0%, transparent 70%);
      bottom: -60px; right: -60px;
    }

    .shine {
      position: absolute;
      inset: 0 0 60% 0;
      background: linear-gradient(180deg, var(--shine) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── PANELS ── */
    .panel {
      flex: 1;
      min-height: 0;
      display: none;
      flex-direction: column;
      position: relative;
      z-index: 1;
      padding: 10px 12px 6px;
    }
    .panel.active { display: flex; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .panel.anim { animation: slideUp 0.2s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }

    /* Glass karta — panel ichidagi asosiy quti */
    .glass-card {
      background: var(--calc-bg);
      backdrop-filter: blur(52px) saturate(1.6);
      -webkit-backdrop-filter: blur(52px) saturate(1.6);
      border-radius: 28px;
      border: 1px solid var(--border);
      box-shadow:
        0 0 0 0.5px var(--shine),
        inset 0 1px 0 var(--shine);
      overflow: hidden;
      position: relative;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    /* Glass karta yuqori yaltiroq chizig'i */
    .glass-card::before {
      content: '';
      position: absolute;
      top: 0; left: 16px; right: 16px;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--shine) 30%,
        rgba(255,255,255,0.18) 50%,
        var(--shine) 70%,
        transparent 100%);
      z-index: 2;
    }

    /* Glass karta ichki yuqori parlash */
    .glass-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 45%;
      border-radius: 28px 28px 0 0;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.055) 0%,
        transparent 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* ── DISPLAY ── */
    .display {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 12px 20px 14px;
      text-align: right;
      overflow: hidden;
    }
    .expr {
      font-size: clamp(14px, 3.8vw, 19px);
      font-weight: 300;
      color: var(--text-dim);
      min-height: 22px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 2px;
    }
    .result {
      font-size: clamp(60px, 17vw, 92px);
      font-weight: 200;
      color: var(--text-main);
      line-height: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: font-size 0.12s ease;
    }
    .result span {
      display: inline-block;
      transform-origin: right center;
    }
    @keyframes pop {
      0%   { opacity: 0.55; transform: scale(0.93); }
      55%  { transform: scale(1.025); }
      100% { opacity: 1; transform: scale(1); }
    }
    .popping { animation: pop 0.17s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }

    /* ── BUTTONS ── */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(7px, 2vw, 11px);
      padding: 0 14px 10px;
      flex-shrink: 0;
    }
    .btn {
      height: clamp(58px, 21vw, 86px);
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: clamp(22px, 6.5vw, 34px);
      font-weight: 400;
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: filter 0.06s, transform 0.06s;
      outline: none;
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: rgba(255,255,255,0);
      transition: background 0.08s;
    }
    .btn:active::after { background: rgba(255,255,255,0.18); }
    .btn:active { transform: scale(0.91); filter: brightness(0.8); }

    .btn-num  { background: var(--btn-num); }
    .btn-gray { background: var(--btn-gray); color: #111; }
    .btn-org  { background: var(--btn-orange); color: #fff; }
    .btn-org.lit { background: #fff; color: var(--btn-orange); }

    .btn-wide {
      grid-column: span 2;
      border-radius: 999px;
      justify-content: flex-start;
      padding-left: clamp(22px, 8vw, 36px);
    }
    .btn-sm  { font-size: clamp(16px, 4.5vw, 22px); }
    .btn-dot { font-size: clamp(32px, 9vw, 46px); line-height: 1; padding-bottom: 3px; }

    /* ── FORM ELEMENTS ── */
    .s-label {
      font-size: 12px;
      color: var(--label);
      margin-bottom: 6px;
    }
    .s-input, .s-select {
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text-main);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.18s;
      -webkit-appearance: none;
      appearance: none;
    }
    /* Number input spinner o'chirish */
    .s-input[type="number"]::-webkit-inner-spin-button,
    .s-input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .s-input[type="number"] { -moz-appearance: textfield; }
    .s-input:focus { border-color: var(--btn-orange); }
    .s-select { flex: 0 0 108px; font-size: 14px; cursor: pointer; }
    .s-box {
      background: var(--box-bg);
      border-radius: 16px;
      padding: 14px 16px;
      margin-top: 10px;
      border: 1px solid var(--border);
    }
    .s-box-lbl { font-size: 12px; color: var(--label); margin-bottom: 4px; }
    .s-box-val {
      font-size: clamp(20px, 5.5vw, 30px);
      font-weight: 300;
      color: var(--text-main);
    }
    .s-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }

    /* Input wrapper — clear tugmasi uchun */
    .inp-wrap {
      position: relative;
      display: flex;
      align-items: center;
      overflow: hidden;
    }
    .inp-wrap .s-input {
      padding-right: 36px;
      width: 100%;
      min-width: 0;
    }
    .clear-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px; height: 20px;
      border: none; cursor: pointer;
      background: var(--label);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0.7;
      transition: opacity 0.15s;
      padding: 0;
      z-index: 2;
    }
    .clear-btn svg { display: block; }
    .clear-btn:active { opacity: 0.45; }
    .inp-wrap.has-val .clear-btn { display: flex; }

    /* ── PERCENT PANEL ── */
    .pct-wrap {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 18px 18px 16px;
    }
    .pct-num {
      font-size: clamp(46px, 13vw, 70px);
      font-weight: 200;
      color: var(--text-main);
      text-align: right;
      padding-bottom: 10px;
      min-height: 68px;
    }
    .pct-expr {
      font-size: 14px;
      color: var(--text-dim);
      text-align: right;
      margin-bottom: 14px;
    }
    .pct-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .pct-btn {
      padding: 14px 4px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      background: var(--mode-bg);
      color: var(--text-main);
      transition: filter 0.1s, transform 0.1s;
    }
    .pct-btn:active { filter: brightness(0.78); transform: scale(0.96); }
    .pct-btn.on { background: var(--btn-orange); color: #fff; }
    .pct-inputs { display: flex; gap: 10px; margin-bottom: 0; }
    .pct-divider {
      height: 1px;
      background: var(--border);
      margin: 10px 0 4px;
      display: none;
    }
    .pct-divider.show { display: block; }
    .pct-rem-val {
      font-size: clamp(18px, 5vw, 26px);
      color: var(--text-dim);
    }

    /* ── CURRENCY PANEL ── */
    .cur-wrap {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 18px 18px 16px;
    }
    .cur-status {
      font-size: 12px;
      text-align: center;
      padding: 0 0 10px;
      color: var(--label);
    }
    .cur-status.loading { color: #ff9500; }
    .cur-status.ok      { color: #34c759; }
    .cur-status.warn    { color: #ff9a00; }
    .cur-status.error   { color: #ff3b30; }
    .cur-result {
      flex: 1;
      display: flex;
      align-items: center;
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 300;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--box-bg);
      color: var(--text-main);
      min-height: 46px;
      pointer-events: none;
    }
    .swap-btn, .refresh-btn {
      display: block;
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      background: var(--mode-bg);
      color: var(--text-main);
      transition: filter 0.1s;
      margin-bottom: 10px;
    }
    .swap-btn:active, .refresh-btn:active { filter: brightness(0.78); }
    .refresh-btn { margin-top: 10px; margin-bottom: 0; }
    .refresh-btn:disabled { opacity: 0.38; cursor: not-allowed; }

    /* ── DUAL RATE UI ── */
    .cur-status-row {
      display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .cur-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--label);
      background: var(--box-bg); border-radius: 20px;
      padding: 4px 10px; border: 1px solid var(--border);
      flex: 1; min-width: 0;
    }
    .cur-badge-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .off-dot  { background: #34c759; }
    .live-dot { background: #ff9500; }
    .cur-badge.loading .off-dot,
    .cur-badge.loading .live-dot { background: var(--label); animation: pulse 1.2s infinite; }
    .cur-badge.error .off-dot,
    .cur-badge.error .live-dot   { background: #ff3b30; }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }
    .cur-rate-box { margin-top: 8px; }
    .cur-rate-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 4px;
    }
    .cur-rate-type {
      font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
      padding: 2px 8px; border-radius: 10px;
    }
    .off-type  { background: rgba(52,199,89,0.15);  color: #34c759; }
    .live-type { background: rgba(255,149,0,0.15);  color: #ff9500; }
    .cur-rate-src {
      font-size: 11px; color: var(--label);
    }
    .cur-rate-meta {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--label); margin-top: 4px;
      flex-wrap: wrap; gap: 4px;
    }
    .cur-rate-box.unavailable { opacity: 0.45; }

    /* ── BOTTOM NAV ── */
    .nav {
      flex-shrink: 0;
      display: flex;
      background: var(--nav-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 10;
    }
    .nav-pills { display: contents; }
    .pill {
      flex: 1;
      border: none;
      cursor: pointer;
      background: transparent;
      color: var(--label);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 8px 4px 10px;
      transition: color 0.18s;
      font-family: inherit;
      position: relative;
    }
    .pill-icon { width: 22px; height: 22px; flex-shrink: 0; }
    .pill-label { font-size: 10px; font-weight: 500; }
    .pill:active { opacity: 0.55; }

    /* Aktiv tab — juda nozik, dumaloq sof glass */
    .pill.active { color: var(--btn-orange); }
    .pill.active::before {
      content: '';
      position: absolute;
      top: 4px; left: 4px; right: 4px; bottom: 4px;
      border-radius: 20px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border: 0.5px solid rgba(255,255,255,0.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.22);
      z-index: -1;
    }
    body.light .pill.active::before {
      background: rgba(255,255,255,0.32);
      border: 0.5px solid rgba(255,255,255,0.55);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }

    .author {
      text-align: center;
      font-size: 10px;
      color: var(--label);
      opacity: 0.55;
      padding: 3px 0 2px;
      pointer-events: none;
    }
  </style>
</head>
<body class="dark">
<div class="calc-bg"></div>
<div class="calc">
  <div class="shine"></div>

  <!-- HISOB -->
  <div id="p-calc" class="panel active">
    <div class="glass-card">
      <div class="display">
        <div class="expr" id="expr"></div>
        <div class="result" id="result"><span id="rspan">0</span></div>
      </div>
      <div class="buttons">
        <button class="btn btn-gray btn-sm" id="btn-back">
          <svg width="26" height="18" viewBox="0 0 28 20" fill="none">
            <path d="M10.5 1L1 10L10.5 19H27V1H10.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            <line x1="13" y1="7" x2="21" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="21" y1="7" x2="13" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="btn btn-gray btn-sm" id="btn-ac">AC</button>
        <button class="btn btn-gray btn-sm" id="btn-pm">+/−</button>
        <button class="btn btn-org" id="btn-div">÷</button>
        <button class="btn btn-num" data-n="7">7</button>
        <button class="btn btn-num" data-n="8">8</button>
        <button class="btn btn-num" data-n="9">9</button>
        <button class="btn btn-org" id="btn-mul">×</button>
        <button class="btn btn-num" data-n="4">4</button>
        <button class="btn btn-num" data-n="5">5</button>
        <button class="btn btn-num" data-n="6">6</button>
        <button class="btn btn-org" id="btn-sub">−</button>
        <button class="btn btn-num" data-n="1">1</button>
        <button class="btn btn-num" data-n="2">2</button>
        <button class="btn btn-num" data-n="3">3</button>
        <button class="btn btn-org" id="btn-add">+</button>
        <button class="btn btn-num btn-wide" data-n="0">0</button>
        <button class="btn btn-num btn-dot" id="btn-dot">.</button>
        <button class="btn btn-org" id="btn-eq">=</button>
      </div>
    </div>
  </div>

  <!-- FOIZ -->
  <div id="p-pct" class="panel">
    <div class="glass-card">
      <div class="pct-wrap">
        <div class="pct-expr" id="pct-expr">Foiz miqdori</div>
        <div class="pct-num" id="pct-num">—</div>
        <div class="pct-grid">
          <button class="pct-btn on" id="pb-tip"  onclick="setPct('tip')">💡 Foiz miqdori</button>
          <button class="pct-btn"    id="pb-disc" onclick="setPct('disc')">🏷 Chegirma</button>
          <button class="pct-btn"    id="pb-mark" onclick="setPct('markup')">📈 Ustama</button>
          <button class="pct-btn"    id="pb-tax"  onclick="setPct('tax')">🧾 Soliq</button>
        </div>
        <div class="pct-inputs">
          <div style="flex:1">
            <div class="s-label">Asosiy summa</div>
            <div class="inp-wrap" id="wrap-pct-base">
              <input class="s-input" id="pct-base"
                type="text" inputmode="decimal" placeholder="100 000"
                oninput="fmtInp(this,'wrap-pct-base');calcPct()">
              <button class="clear-btn" onclick="clearInp('pct-base','wrap-pct-base');calcPct()" tabindex="-1">
                <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                  <line x1="1" y1="1" x2="9" y2="9" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
                  <line x1="9" y1="1" x2="1" y2="9" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
              </button>
            </div>
          </div>
          <div style="flex:0 0 100px">
            <div class="s-label">Foiz %</div>
            <div class="inp-wrap" id="wrap-pct-rate">
              <input class="s-input" id="pct-rate"
                type="text" inputmode="decimal" placeholder="15"
                oninput="fmtInp(this,'wrap-pct-rate');calcPct()">

<script>
'use strict';

/* ─── TEMA ─────────────────────────────────────────── */
var dark = true;
function toggleTheme() {
  dark = !dark;
  document.body.className = dark ? 'dark' : 'light';
  document.documentElement.className = dark ? '' : 'light';
  document.querySelector('meta[name="theme-color"]')
    .setAttribute('content', dark ? '#0d1117' : '#e8eaf6');
  document.getElementById('theme-svg').innerHTML = dark
    ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="currentColor"/>'
    : '<circle cx="12" cy="12" r="5" fill="currentColor"/>'
      + '<g stroke="currentColor" stroke-width="1.8" stroke-linecap="round">'
      + '<line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/>'
      + '<line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/>'
      + '<line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>'
      + '<line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
      + '</g>';
  document.getElementById('theme-lbl').textContent = dark ? 'Tungi' : 'Kunduz';
}

/* ─── TABS ──────────────────────────────────────────── */
var TABS = { calc:'p-calc', pct:'p-pct', cur:'p-cur' };
var curTab = 'calc';
function switchTab(t) {
  if (curTab === t) return;
  document.getElementById(TABS[curTab]).classList.remove('active');
  document.getElementById('nb-' + curTab).classList.remove('active');
  curTab = t;
  var panel = document.getElementById(TABS[t]);
  panel.classList.add('active');
  panel.classList.remove('anim');
  void panel.offsetWidth;
  panel.classList.add('anim');
  document.getElementById('nb-' + t).classList.add('active');
  if (t === 'cur' && !curState.official && !curState.live) loadRates();
}

/* ─── CALCULATOR ────────────────────────────────────── */
var first = null;       // birinchi operand (number)
var op    = null;       // operator string
var input = '0';        // joriy kiritilayotgan son (vergulsiz, sof raqam)
var waited  = false;    // operator bosildi, ikkinchi raqam kutilmoqda
var evaled  = false;    // = bosildi

var rspanEl  = document.getElementById('rspan');
var resultEl = document.getElementById('result');
var exprEl   = document.getElementById('expr');
var acBtn    = document.getElementById('btn-ac');
var opBtns   = {
  '+': document.getElementById('btn-add'),
  '−': document.getElementById('btn-sub'),
  '×': document.getElementById('btn-mul'),
  '÷': document.getElementById('btn-div')
};

/* Raqamni chiroyli formatlash (vergul bilan) */
function fmtDisp(s) {
  if (s === 'Xato') return 'Xato';
  var neg  = s.charAt(0) === '-';
  var body = neg ? s.slice(1) : s;
  var parts = body.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return (neg ? '-' : '') + parts.join('.');
}

/* input string ni hisob uchun xavfsiz float ga aylantirish */
function toNum(s) {
  return parseFloat(s);   // input hech qachon vergul tutmaydi
}

function setFontSize(disp) {
  var L = disp.replace(/[,.\-]/g, '').length;
  resultEl.style.fontSize =
    L <= 6  ? 'clamp(60px,17vw,92px)'  :
    L <= 9  ? 'clamp(46px,13vw,72px)'  :
    L <= 12 ? 'clamp(34px,10vw,54px)'  :
              'clamp(24px, 7vw,38px)';
}

function animPop() {
  rspanEl.classList.remove('popping');
  void rspanEl.offsetWidth;
  rspanEl.classList.add('popping');
}

function hlOp(o) {
  Object.values(opBtns).forEach(function(b){ b.classList.remove('lit'); });
  if (o && opBtns[o]) opBtns[o].classList.add('lit');
}

function render() {
  var d = fmtDisp(input);
  rspanEl.textContent = d;
  setFontSize(d);
  acBtn.textContent = (input === '0' && first === null && !op) ? 'AC' : 'C';
  /* expr refresh — faqat = bosilmagan bo'lsa */
  if (!evaled) {
    if (first !== null && op) {
      exprEl.textContent = waited
        ? fmtDisp(String(first)) + ' ' + op
        : fmtDisp(String(first)) + ' ' + op + ' ' + fmtDisp(input);
    } else {
      exprEl.textContent = '';
    }
  }
}

function compute(a, b, o) {
  var r;
  if      (o === '+') r = a + b;
  else if (o === '−') r = a - b;
  else if (o === '×') r = a * b;
  else if (o === '÷') { if (b === 0) return null; r = a / b; }
  else return b;
  /* Float precision fix */
  return parseFloat(r.toPrecision(12));
}

/* Raqam tugmalari */
document.querySelectorAll('[data-n]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var n = btn.dataset.n;
    if (evaled) {
      input = (n === '0') ? '0' : n;
      first = null; op = null; evaled = false; waited = false;
      exprEl.textContent = '';
    } else if (waited) {
      input = (n === '0') ? '0' : n;
      waited = false;
    } else {
      if (input === '0') {
        input = (n === '0') ? '0' : n;
      } else if (input.replace(/[.\-]/g,'').length < 15) {
        input += n;
      }
    }
    hlOp(op);
    render();
    animPop();
  });
});

/* Nuqta */
document.getElementById('btn-dot').addEventListener('click', function() {
  if (evaled) {
    input = '0.'; first = null; op = null; evaled = false; waited = false;
    exprEl.textContent = '';
  } else if (waited) {
    input = '0.'; waited = false;
  } else if (input.indexOf('.') === -1) {
    input += '.';
  }
  render();
});

/* Backspace */
document.getElementById('btn-back').addEventListener('click', function() {
  if (evaled || input === 'Xato') {
    input = '0'; first = null; op = null; evaled = false; waited = false;
    exprEl.textContent = ''; hlOp(null);
  } else if (waited) {
    op = null; waited = false; hlOp(null);
  } else {
    input = input.length > 1 ? input.slice(0, -1) : '0';
    if (input === '-') input = '0';
  }
  render();
});

/* AC / C */
document.getElementById('btn-ac').addEventListener('click', function() {
  input = '0'; first = null; op = null; waited = false; evaled = false;
  exprEl.textContent = ''; hlOp(null); render();
});

/* +/- */
document.getElementById('btn-pm').addEventListener('click', function() {
  if (input === '0' || input === 'Xato') return;
  input = input.charAt(0) === '-' ? input.slice(1) : '-' + input;
  render();
});

/* Operator */
function handleOp(newOp) {
  if (input === 'Xato') return;
  hlOp(newOp);
  if (first !== null && !waited && !evaled) {
    var r = compute(first, toNum(input), op);
    if (r === null) {
      input = 'Xato'; first = null; op = null;
      exprEl.textContent = ''; hlOp(null); render(); return;
    }
    first = r;
    /* input ni r dan yangilaymiz — float string */
    input = String(parseFloat(r.toPrecision(10)));
    animPop();
  } else {
    first = toNum(input);
  }
  op = newOp; waited = true; evaled = false; render();
}

document.getElementById('btn-add').addEventListener('click', function(){ handleOp('+'); });
document.getElementById('btn-sub').addEventListener('click', function(){ handleOp('−'); });
document.getElementById('btn-mul').addEventListener('click', function(){ handleOp('×'); });
document.getElementById('btn-div').addEventListener('click', function(){ handleOp('÷'); });

/* Teng */
document.getElementById('btn-eq').addEventListener('click', function() {
  if (first === null || op === null) return;
  var second = toNum(input);
  var r      = compute(first, second, op);
  /* expr yuqoriga: "5 × 5 =" */
  exprEl.textContent =
    fmtDisp(String(first)) + ' ' + op + ' ' + fmtDisp(String(second)) + ' =';
  if (r === null) {
    input = 'Xato';
  } else {
    input = String(parseFloat(r.toPrecision(10)));
  }
  first = null; op = null; waited = false; evaled = true;
  hlOp(null);
  var d = fmtDisp(input);
  rspanEl.textContent = d;
  setFontSize(d);
  acBtn.textContent = 'C';
  animPop();
});

render();

/* ─── FOIZ ──────────────────────────────────────────── */

/* Formatlash yordamchilari */
function stripFmt(s) {
  /* Bo'sh joy va vergullarni olib tashlash, sof raqam qoldirish */
  return (s || '').replace(/[\s,]/g, '');
}

function addSpaces(s) {
  /* "1000000.5" → "1 000 000.5", "2." → "2." (nuqta saqlanadi) */
  if (!s) return '';
  var hasDot   = s.indexOf('.') !== -1;
  var parts    = s.split('.');
  parts[0]     = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
  /* Bo'sh kasr qism ham saqlanadi: "2." → "2." */
  return hasDot ? parts[0] + '.' + (parts[1] || '') : parts[0];
}

function fmtInp(el, wrapId) {
  var val    = el.value;
  var cursor = el.selectionEnd || 0;

  /* Sof raqam */
  var raw   = stripFmt(val).replace(/[^0-9.]/g, '');
  var parts = raw.split('.');
  if (parts.length > 2) raw = parts[0] + '.' + parts.slice(1).join('');

  /* pct-rate uchun minglik ajratish shart emas */
  var formatted = (wrapId === 'wrap-pct-rate') ? raw : addSpaces(raw);

  if (el.value !== formatted) {
    /* Kursordan oldin nechta raqam va nuqta bor edi */
    var before     = val.slice(0, cursor);
    var digsBefore = before.replace(/[^0-9]/g, '').length;
    var hasDotBefore = before.indexOf('.') !== -1;

    el.value = formatted;

    /* Yangi pozitsiya: raqamlar soniga qarab topamiz */
    var digs = 0;
    var pos  = formatted.length;
    for (var i = 0; i < formatted.length; i++) {
      var ch = formatted[i];
      if (/[0-9]/.test(ch)) {
        digs++;
        if (digs === digsBefore && !hasDotBefore) { pos = i + 1; break; }
      } else if (ch === '.') {
        if (hasDotBefore && digs === digsBefore) { pos = i + 1; break; }
      }
    }
    /* Agar barcha raqamlar hisoblandiyam topilmasa — oxiriga */
    if (digs < digsBefore) pos = formatted.length;
    try { el.setSelectionRange(pos, pos); } catch(e) {}
  }

  /* Clear tugmasi */
  var wrap = document.getElementById(wrapId);
  if (wrap) {
    if (raw) wrap.classList.add('has-val');
    else wrap.classList.remove('has-val');
  }
}

function clearInp(id, wrapId) {
  var el = document.getElementById(id);
  el.value = '';
  var wrap = document.getElementById(wrapId);
  if (wrap) wrap.classList.remove('has-val');
  el.focus();
}

function getRawVal(id) {
  var raw = stripFmt(document.getElementById(id).value);
  /* Oxirida nuqta bo'lsa — hali yozilmagan, NaN qaytaramiz */
  if (raw.slice(-1) === '.') return NaN;
  return parseFloat(raw) || 0;
}
var pctMode = 'tip';

function setPct(mode) {
  pctMode = mode;
  ['tip','disc','mark','tax'].forEach(function(m){
    document.getElementById('pb-' + m).classList.remove('on');
  });
  var map = { tip:'pb-tip', disc:'pb-disc', markup:'pb-mark', tax:'pb-tax' };
  if (map[mode]) document.getElementById(map[mode]).classList.add('on');
  var labels = {
    tip:    'Foiz miqdori',
    disc:   'Chegirma hisoblash',
    markup: 'Ustama narx',
    tax:    "Soliq qo'shish"
  };
  document.getElementById('pct-expr').textContent = labels[mode] || '';
  calcPct();
}

function money(n) {
  return Math.round(n).toLocaleString('uz-UZ') + " so'm";
}

function calcPct() {
  var base = getRawVal('pct-base');
  var rate = getRawVal('pct-rate');
  var num  = document.getElementById('pct-num');
  var lbl  = document.getElementById('pct-lbl');
  var val  = document.getElementById('pct-val');
  var sub  = document.getElementById('pct-sub');
  var div  = document.getElementById('pct-divider');
  var remLbl = document.getElementById('pct-rem-lbl');
  var rem    = document.getElementById('pct-rem');

  if (isNaN(base) || isNaN(rate) || !isFinite(base) || !isFinite(rate) || base <= 0 || rate <= 0) {
    num.textContent    = '—';
    val.textContent    = '—';
    sub.textContent    = '';
    rem.textContent    = '—';
    remLbl.textContent = '';
    div.className      = 'pct-divider';
    return;
  }

  var amt     = base * rate / 100;
  var fmtBase = addSpaces(String(Math.round(base)));
  var formula = fmtBase + ' × ' + rate + '% = ' + money(amt);
  div.className = 'pct-divider show';

  if (pctMode === 'disc') {
    var result = base - amt;
    val.textContent    = money(result);
    lbl.textContent    = 'Chegirmali narx';
    sub.textContent    = formula;
    num.textContent    = '−' + rate + '%';
    remLbl.textContent = 'Qoldiq (chegirma miqdori)';
    rem.textContent    = money(amt);

  } else if (pctMode === 'markup') {
    var result = base + amt;
    val.textContent    = money(result);
    lbl.textContent    = 'Ustama bilan narx';
    sub.textContent    = formula;
    num.textContent    = '+' + rate + '%';
    remLbl.textContent = 'Asl narx (ustama siz)';
    rem.textContent    = money(base);

  } else if (pctMode === 'tax') {
    var result = base + amt;
    val.textContent    = money(result);
    lbl.textContent    = 'Soliq bilan jami';
    sub.textContent    = formula;
    num.textContent    = '+' + rate + '%';
    remLbl.textContent = 'Soliqqacha narx';
    rem.textContent    = money(base);

  } else {
    /* tip — foiz miqdori */
    val.textContent    = money(amt);
    lbl.textContent    = 'Foiz miqdori';
    sub.textContent    = formula;
    num.textContent    = money(amt).replace(" so'm", '');
    remLbl.textContent = 'Qoldiq (foiz chiqarilgandan keyin)';
    rem.textContent    = money(base - amt);
  }
}

/* ═══════════════════════════════════════════════════════
   VALYUTA MODULI — Backend-first arxitektura
   ═══════════════════════════════════════════════════════
   Asosiy manba: /api/rates (Vercel serverless)
     - CBU rasmiy + Market jonli parallel qaytaradi
     - Vercel Edge 15 daqiqa keshlaydi
     - Barcha foydalanuvchilar keshdan o'qiydi
   Fallback: tashqi API lar to'g'ridan (backend ishlamasa)
   LocalStorage: oxirgi muvaffaqiyatli kurslar (TTL: 24h)
   ═══════════════════════════════════════════════════════ */

var CUR = {
  LS_KEY:        'kalk_cur_v3',
  BACKEND_URL:   '/api/rates',
  LIVE_TTL:       15 * 60 * 1000,
  OFF_TTL:        60 * 60 * 1000,
  RETRY_ERROR:     5 * 60 * 1000,
  FETCH_TIMEOUT:   8 * 1000,
  LS_TTL:         24 * 60 * 60 * 1000,   /* 24 soat */
  CURRENCIES:    ['USD','UZS','EUR','RUB','AED','GBP','KZT']
};

var curState = {
  official: null,
  live:     null,
  timers:   { official: null, live: null, refresh: null },
  loading:  { official: false, live: false }
};

/* ── LocalStorage — TTL bilan ── */
var LS = {
  save: function(official, live) {
    try {
      localStorage.setItem(CUR.LS_KEY, JSON.stringify({
        official: official || null,
        live:     live     || null,
        savedAt:  Date.now()
      }));
    } catch(e) {}
  },
  load: function() {
    try {
      var raw = localStorage.getItem(CUR.LS_KEY);
      if (!raw) return { official: null, live: null };
      var data = JSON.parse(raw);
      /* TTL tekshiruvi — 24 soatdan eski bo'lsa ishlatmaymiz */
      if (Date.now() - (data.savedAt || 0) > CUR.LS_TTL) {
        localStorage.removeItem(CUR.LS_KEY);
        return { official: null, live: null };
      }
      return data;
    } catch(e) { return { official: null, live: null }; }
  }
};

/* ── Vaqt formatlash ── */
function fmtTime(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  return String(d.getHours()).padStart(2,'0') + ':'
       + String(d.getMinutes()).padStart(2,'0');
}

/* ── Sana formatlash — har qanday formatdan M.DD.YYYY ga ── */
function fmtDate(str) {
  if (!str) return '';
  var d;

  /* "22.03.2026" — CBU formati */
  var m1 = str.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if (m1) {
    d = new Date(parseInt(m1[3]), parseInt(m1[2])-1, parseInt(m1[1]));
  }
  /* "2026-03-22" — ISO formati */
  else if (/^\d{4}-\d{2}-\d{2}/.test(str)) {
    d = new Date(str);
  }
  /* Boshqa formatlar — Date parse */
  else {
    d = new Date(str);
  }

  if (!d || isNaN(d.getTime())) return str;
  return (d.getMonth()+1) + '.' + String(d.getDate()).padStart(2,'0') + '.' + d.getFullYear();
}

/* ── Timeout bilan fetch ── */
function fetchT(url) {
  if (!window.AbortController) return fetch(url, { cache: 'no-store' });
  var ctrl  = new AbortController();
  var timer = setTimeout(function(){ ctrl.abort(); }, CUR.FETCH_TIMEOUT);
  return fetch(url, { signal: ctrl.signal, cache: 'no-store' })
    .finally(function(){ clearTimeout(timer); });
}

/* ══════════════════════════════════════════════
   BACKEND — asosiy manba
   /api/rates → { official, live, serverTime }
   ══════════════════════════════════════════════ */
function fetchFromBackend() {
  return fetchT(CUR.BACKEND_URL)
    .then(function(r) {
      if (!r.ok) throw new Error('backend http ' + r.status);
      return r.json();
    })
    .then(function(data) {
      if (!data.official && !data.live) throw new Error('backend empty');
      /* fetchedAt ni frontend qo'yadi */
      var now = Date.now();
      if (data.official) data.official.fetchedAt = now;
      if (data.live)     data.live.fetchedAt     = now;
      /* Eski kurs bo'lsa badge da ko'rsatamiz */
      data._isToday = data.isToday !== false;
      return data;
    });
}

/* ══════════════════════════════════════════════
   FALLBACK — backend ishlamasa to'g'ridan
   ══════════════════════════════════════════════ */
var CBU_PROXIES = [
  {
    url: 'https://api.allorigins.win/get?url=' +
         encodeURIComponent('https://cbu.uz/ru/arkhiv-kursov-valyut/json/'),
    parse: function(d) {
      var arr = JSON.parse(d.contents);
      return parseCbuArr(arr);
    }
  },
  {
    url: 'https://corsproxy.io/?' +
         encodeURIComponent('https://cbu.uz/ru/arkhiv-kursov-valyut/json/'),
    parse: function(d) {
      var arr = Array.isArray(d) ? d : JSON.parse(d);
      return parseCbuArr(arr);
    }
  }
];

function parseCbuArr(arr) {
  if (!Array.isArray(arr) || arr.length === 0) throw new Error('empty cbu');
  var rates = { UZS: 1 };
  arr.forEach(function(item) {
    if (CUR.CURRENCIES.indexOf(item.Ccy) !== -1 && item.Ccy !== 'UZS') {
      var r = parseFloat(item.Rate);
      var n = parseFloat(item.Nominal) || 1;
      if (r > 0) rates[item.Ccy] = r / n;
    }
  });
  if (!rates.USD) throw new Error('no USD');
  return {
    rates:         rates,
    source:        'cbu (direct)',
    effectiveDate: arr[0] ? (arr[0].Date || '') : '',
    fetchedAt:     Date.now(),
    type:          'official'
  };
}

function fetchOfficialDirect(idx) {
  if (idx >= CBU_PROXIES.length) return Promise.reject(new Error('cbu failed'));
  var p = CBU_PROXIES[idx];
  return fetchT(p.url)
    .then(function(r) {
      if (!r.ok) throw new Error('http ' + r.status);
      return r.json();
    })
    .then(function(data) { return p.parse(data); })
    .catch(function() { return fetchOfficialDirect(idx + 1); });
}

function parseFawaz(d) {
  var usdData = d.usd || d.USD;
  if (!usdData) throw new Error('no usd');
  var uzsPerUsd = usdData['uzs'];
  if (!uzsPerUsd || uzsPerUsd <= 0) throw new Error('no uzs');
  var rates = { UZS: 1, USD: uzsPerUsd };
  ['eur','rub','aed','gbp','kzt'].forEach(function(k) {
    var v = usdData[k];
    if (v && v > 0) rates[k.toUpperCase()] = uzsPerUsd / v;
  });
  return {
    rates:         rates,
    source:        'fawazahmed0',
    effectiveDate: d.date || '',
    fetchedAt:     Date.now(),
    type:          'market'
  };
}

var LIVE_PROVIDERS = [
  {
    url:   'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.min.json',
    parse: parseFawaz
  },
  {
    url:   'https://latest.currency-api.pages.dev/v1/currencies/usd.min.json',
    parse: parseFawaz
  },
  {
    url: 'https://open.er-api.com/v6/latest/USD',
    parse: function(d) {
      if (!d.rates) throw new Error('no rates');
      var uzsPerUsd = d.rates['UZS'];
      if (!uzsPerUsd || uzsPerUsd <= 0) throw new Error('no uzs');
      var rates = { UZS: 1, USD: uzsPerUsd };
      ['EUR','RUB','AED','GBP','KZT'].forEach(function(k) {
        var v = d.rates[k];
        if (v && v > 0) rates[k] = uzsPerUsd / v;
      });
      return {
        rates:         rates,
        source:        'open.er-api',
        effectiveDate: d.time_last_update_utc || '',
        fetchedAt:     Date.now(),
        type:          'market'
      };
    }
  }
];

function fetchLiveDirect(idx) {
  if (idx >= LIVE_PROVIDERS.length) return Promise.reject(new Error('live failed'));
  var p = LIVE_PROVIDERS[idx];
  return fetchT(p.url)
    .then(function(r) {
      if (!r.ok) throw new Error('http ' + r.status);
      return r.json();
    })
    .then(function(data) { return p.parse(data); })
    .catch(function() { return fetchLiveDirect(idx + 1); });
}

/* ══════════════════════════════════════════════
   UI yangilash
   ══════════════════════════════════════════════ */
function setBadge(type, state, text) {
  var badge = document.getElementById(type + '-badge');
  var txt   = document.getElementById(type + '-st-txt');
  if (!badge || !txt) return;
  badge.className = 'cur-badge ' + state;
  txt.textContent = text;
}

function setRateBox(type, data, from, to) {
  var box     = document.getElementById(type + '-box');
  var rateEl  = document.getElementById(type + '-rate');
  var srcEl   = document.getElementById(type + '-src');
  var dateEl  = document.getElementById(type + '-date');
  var fetchEl = document.getElementById(type + '-fetched');
  if (!box) return;

  if (!data) {
    box.classList.add('unavailable');
    rateEl.textContent  = "Ma'lumot yo'q";
    srcEl.textContent   = '—';
    dateEl.textContent  = '';
    fetchEl.textContent = '';
    return;
  }
  box.classList.remove('unavailable');

  var fRate = getFromData(data, from);
  var tRate = getFromData(data, to);
  if (fRate && tRate) {
    var rate    = fRate / tRate;
    var isLarge = (to === 'UZS' || to === 'KZT');
    rateEl.textContent = '1 ' + from + ' = '
      + rate.toLocaleString('uz-UZ', { maximumFractionDigits: isLarge ? 0 : 4 })
      + ' ' + to;
  } else {
    rateEl.textContent = 'Kurs topilmadi';
  }

  srcEl.textContent   = data.source        || '—';
  dateEl.textContent  = data.effectiveDate  ? (fmtDate(data.effectiveDate))         : '';
  fetchEl.textContent = data.fetchedAt      ? ('Yangilandi: ' + fmtTime(data.fetchedAt)) : '';
}

function getFromData(data, ccy) {
  if (!data || !data.rates) return null;
  if (ccy === 'UZS') return 1;
  var r = data.rates[ccy];
  return (r !== undefined && r > 0) ? r : null;
}

/* ══════════════════════════════════════════════
   Konvertatsiya
   ══════════════════════════════════════════════ */
function convert() {
  var from  = document.getElementById('from-c').value;
  var to    = document.getElementById('to-c').value;
  var amt   = getRawVal('cur-amt');
  var resEl = document.getElementById('cur-res');

  /* Nuqta kiritilayotganda natijani tozalaymiz lekin kurs qutilari yangilansin */
  if (isNaN(amt)) {
    resEl.textContent = '—';
    setRateBox('off',  curState.official, from, to);
    setRateBox('live', curState.live,     from, to);
    return;
  }

  /* Live ustunlik qiladi */
  var data = curState.live || curState.official;

  if (!data) {
    resEl.textContent = '—';
    setRateBox('off',  curState.official, from, to);
    setRateBox('live', curState.live,     from, to);
    return;
  }

  var fRate = getFromData(data, from);
  var tRate = getFromData(data, to);

  if (!fRate || !tRate || !isFinite(amt) || amt <= 0) {
    resEl.textContent = amt > 0 ? "Kurs yo'q" : '—';
  } else {
    var result  = (amt * fRate) / tRate;
    var isLarge = (to === 'UZS' || to === 'KZT');
    resEl.textContent = isFinite(result)
      ? result.toLocaleString('uz-UZ', { maximumFractionDigits: isLarge ? 0 : (to === 'RUB' ? 1 : 4) })
      : '—';
  }

  setRateBox('off',  curState.official, from, to);
  setRateBox('live', curState.live,     from, to);
}

function swapCur() {
  var f = document.getElementById('from-c');
  var t = document.getElementById('to-c');
  var tmp = f.value; f.value = t.value; t.value = tmp;
  convert();
}

/* ══════════════════════════════════════════════
   Asosiy yuklovchi
   ══════════════════════════════════════════════ */
function applyData(official, live) {
  if (official) curState.official = official;
  if (live)     curState.live     = live;
  LS.save(curState.official, curState.live);
  convert();
}

function scheduleRefresh(ms) {
  if (curState.timers.refresh) clearTimeout(curState.timers.refresh);
  curState.timers.refresh = setTimeout(function() { fetchAndApply(); }, ms);
}

function fetchAndApply() {
  /* 1-urinish: backend */
  fetchFromBackend()
    .then(function(data) {
      applyData(data.official, data.live);

      var offLabel  = data.officialToday ? 'Rasmiy kurs — ' + fmtDate(data.official && data.official.effectiveDate) : '⚠️ Rasmiy kurs (kecha)';
      var liveLabel = data.live
        ? ('Jonli kurs' + (data.liveAgeMin !== null ? ' — ' + data.liveAgeMin + ' daq. oldin' : ''))
        : null;

      if (data.official) setBadge('off',  'ok',    offLabel);
      else               setBadge('off',  'error', "Rasmiy kurs yo'q");
      if (data.live)     setBadge('live', 'ok',    liveLabel);
      else               setBadge('live', 'error', "Jonli kurs yo'q");

      scheduleRefresh(CUR.LIVE_TTL);
    })
    .catch(function() {
      /* 2-urinish: to'g'ridan */
      setBadge('off',  'loading', 'Rasmiy kurs yuklanmoqda...');
      setBadge('live', 'loading', 'Jonli kurs yuklanmoqda...');

      Promise.allSettled([
        fetchOfficialDirect(0),
        fetchLiveDirect(0)
      ]).then(function(results) {
        var official = results[0].status === 'fulfilled' ? results[0].value : null;
        var live     = results[1].status === 'fulfilled' ? results[1].value : null;

        if (official) {
          applyData(official, null);
          setBadge('off', 'ok', 'Rasmiy kurs — ' + fmtDate(official.effectiveDate));
        } else {
          setBadge('off', 'error', curState.official
            ? 'Rasmiy kurs (kesh) — ' + fmtDate(curState.official.effectiveDate)
            : "Rasmiy kurs mavjud emas");
        }

        if (live) {
          applyData(null, live);
          setBadge('live', 'ok', 'Jonli kurs — ' + fmtTime(live.fetchedAt));
        } else {
          setBadge('live', 'error', curState.live
            ? 'Jonli kurs (kesh) — ' + fmtTime(curState.live.fetchedAt)
            : "Jonli kurs mavjud emas");
        }

        scheduleRefresh(official || live ? CUR.LIVE_TTL : CUR.RETRY_ERROR);
      });
    });
}

function loadRates() {
  /* 1. LocalStorage dan tez ko'rsatamiz */
  var cached = LS.load();
  if (cached.official) {
    curState.official = cached.official;
    setBadge('off', 'cache', 'Rasmiy kurs (kesh) — ' + fmtDate(cached.official.effectiveDate));
  }
  if (cached.live) {
    curState.live = cached.live;
    setBadge('live', 'cache', 'Jonli kurs (kesh) — ' + fmtTime(cached.live.fetchedAt));
  }
  if (cached.official || cached.live) convert();

  /* 2. Orqada yangilaymiz */
  fetchAndApply();
}

/* Qo'lda yangilash — faqat KV dan o'qiydi, API ga urmaydi */
var lastManualRefresh = 0;
window.onRefreshRates = function() {
  var now  = Date.now();
  var wait = 10 * 1000; /* 10 soniya debounce */
  if (now - lastManualRefresh < wait) return;
  lastManualRefresh = now;
  fetchAndApply();
};

/* Sahifa to'liq yuklangandan keyin kurslarni yuklash */
window.addEventListener('load', function() { loadRates(); });

/* ─── SCROLL LOCK ───────────────────────────────────── */
document.addEventListener('touchmove', function(e) {
  var el = e.target;
  while (el && el !== document.documentElement) {
    if (el.id === 'p-pct' || el.id === 'p-cur') return;
    if (el.classList && (el.classList.contains('pct-wrap') || el.classList.contains('cur-wrap'))) return;
    el = el.parentElement;
  }
  e.preventDefault();
}, { passive: false });

/* Double tap zoom o'chirish */
var lastTap = 0;
document.addEventListener('touchend', function(e) {
  var now = Date.now();
  if (now - lastTap < 280) e.preventDefault();
  lastTap = now;
}, { passive: false });

document.addEventListener('contextmenu', function(e){ e.preventDefault(); });

/* ─── SERVICE WORKER ────────────────────────────────── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js').catch(function(){});
  });
}
