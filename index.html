<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kalkulyator</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kalkulyator">
  <meta name="theme-color" content="#0d1117">
  <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <meta name="application-name" content="Kalkulyator">
  <meta name="msapplication-TileColor" content="#0d1117">
  <meta name="msapplication-TileImage" content="/icon-192.png">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    input, select { -webkit-user-select: text; user-select: text; }
    button { touch-action: manipulation; -webkit-user-select: none; user-select: none; }

    html {
      height: 100%;
      height: -webkit-fill-available;
      overflow: hidden;
      background: #000000;
    }
    html.light { background: #ffffff; }

    body {
      height: 100vh;
      height: 100dvh;
      height: -webkit-fill-available;
      overflow: hidden;
      overscroll-behavior: none;
      position: fixed;
      inset: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: var(--calc-bg);
      transition: background 0.3s ease;
    }
    body.dark {
      --calc-bg: #000000;
      --btn-num: #333333;
      --btn-gray: #a5a5a5;
      --btn-orange: #ff9f0a;
      --text-main: #ffffff;
      --text-dim: rgba(255, 255, 255, 0.6);
      --mode-bg: rgba(255, 255, 255, 0.05);
      --shine: rgba(255, 255, 255, 0.15);
      --border: rgba(255, 255, 255, 0.08);
      --box-bg: rgba(255, 255, 255, 0.03);
      --input-bg: rgba(0, 0, 0, 0.12);
      --input-border: rgba(255, 255, 255, 0.08);
      --label: rgba(255, 255, 255, 0.38);
      --nav-bg: rgba(0, 0, 0, 0.82);
    }
    body.light {
      --calc-bg: #ffffff;
      --btn-num: #e5e5e5;
      --btn-gray: #d4d4d2;
      --btn-orange: #ff9f0a;
      --text-main: #000000;
      --text-dim: rgba(0, 0, 0, 0.5);
      --mode-bg: rgba(0, 0, 0, 0.04);
      --shine: rgba(255, 255, 255, 0.6);
      --border: rgba(0, 0, 0, 0.06);
      --box-bg: rgba(0, 0, 0, 0.02);
      --input-bg: rgba(255, 255, 255, 0.5);
      --input-border: rgba(0, 0, 0, 0.06);
      --label: rgba(0, 0, 0, 0.4);
      --nav-bg: rgba(242, 242, 247, 0.85);
    }

    /* ── DESKTOP BEZEL CONTAINER (SENIOR LEVEL) ── */
    @media (min-width: 480px) {
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        position: static;
        height: 100vh;
      }
      body.dark {
        background: #05070a;
      }
      body.light {
        background: #e4e7eb;
      }
      .calc-bg {
        display: block; /* Show glowing background circles on desktop only */
      }
      .calc {
        max-width: 412px;
        height: 90vh;
        max-height: 860px;
        border-radius: 40px;
        box-shadow: 0 30px 70px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.12);
        border: 8px solid #1c1c1e;
        overflow: hidden;
      }
      body.light .calc {
        border-color: #d1d1d6;
        box-shadow: 0 30px 70px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.05);
      }
    }

    /* ── ORIGINAL CLASSIC GRADIENT BACKGROUND ── */
    .calc-bg {
      display: none; /* Hidden on mobile to avoid double-background */
      position: fixed;
      inset: 0;
      z-index: 0;
      transition: background 0.5s;
    }
    body.dark .calc-bg {
      background: linear-gradient(145deg, #0d1117 0%, #0f1d2e 50%, #0a1628 100%);
    }
    body.light .calc-bg {
      background: linear-gradient(145deg, #e8eaf6 0%, #c5cae9 50%, #9fa8da 100%);
    }

    /* Original glowing ambient circles */
    .calc-bg::before {
      content: '';
      position: absolute;
      width: 340px; height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(80,160,255,0.18) 0%, transparent 70%);
      top: -80px; left: -80px;
      pointer-events: none;
    }
    .calc-bg::after {
      content: '';
      position: absolute;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(160,80,255,0.14) 0%, transparent 70%);
      bottom: -60px; right: -60px;
      pointer-events: none;
    }

    .calc {
      width: 100%;
      height: 100%;
      background: transparent;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .shine {
      position: absolute;
      inset: 0 0 60% 0;
      background: linear-gradient(180deg, var(--shine) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── PANELS ── */
    .panel {
      flex: 1;
      min-height: 0;
      display: none;
      flex-direction: column;
      position: relative;
      z-index: 1;
      padding: 0; /* Edge-to-edge flat mobile design */
    }
    .panel.active { display: flex; }
    @keyframes slideForward {
      from { opacity: 0; transform: translateX(25px) scale(0.99); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes slideBackward {
      from { opacity: 0; transform: translateX(-25px) scale(0.99); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }
    .panel.anim-forward { animation: slideForward 0.22s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .panel.anim-backward { animation: slideBackward 0.22s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* ── IPHONE HOME INDICATOR ── */
    .home-indicator-container {
      width: 100%;
      height: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--nav-bg);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      padding-bottom: 6px;
      cursor: ew-resize;
      z-index: 10;
      user-select: none;
      touch-action: none;
      border-top: none;
      margin-top: -1px;
    }
    .home-indicator {
      width: 140px;
      height: 5px;
      border-radius: 100px;
      background: rgba(255, 255, 255, 0.45);
      transition: background 0.2s, transform 0.2s;
    }
    body.light .home-indicator {
      background: rgba(0, 0, 0, 0.3);
    }
    .home-indicator-container:active .home-indicator {
      background: rgba(255, 255, 255, 0.85);
      transform: scaleY(1.2);
    }
    body.light .home-indicator-container:active .home-indicator {
      background: rgba(0, 0, 0, 0.6);
    }

    /* iPhone Frosted Glass Panel */
    .glass-card {
      background: var(--calc-bg);
      overflow: hidden;
      position: relative;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    /* ── DISPLAY ── */
    .display {
      flex: 1;
      min-height: 90px; /* Guarantee ample height to prevent collapsing and clipping */
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 30px 24px 8px; /* Elegant iPhone display spacing */
      text-align: right;
      overflow: hidden;
      z-index: 2;
    }
    .expr {
      font-size: clamp(14px, 3.8vw, 19px);
      font-weight: 300;
      color: var(--text-dim);
      min-height: 22px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 2px;
    }
    .result {
      font-size: clamp(44px, 12vw, 68px); /* Safe, gorgeous dynamic font size */
      font-weight: 200;
      color: var(--text-main);
      line-height: 1.15; /* Prevents text clipping of top loops and tails */
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: font-size 0.12s ease;
    }
    .result span {
      display: inline-block;
      transform-origin: right center;
    }
    @keyframes pop {
      0%   { opacity: 0.55; transform: scale(0.93); }
      55%  { transform: scale(1.025); }
      100% { opacity: 1; transform: scale(1); }
    }
    .popping { animation: pop 0.17s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }

    /* ── IPHONE GLASS BUTTONS ── */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(10px, 2.5vw, 14px);
      padding: 8px 18px clamp(16px, 5vw, 24px);
      flex-shrink: 0;
      z-index: 2;
    }
    .btn {
      width: 100%;
      max-width: 86px;
      aspect-ratio: 1 / 1;
      justify-self: center;
      align-self: center;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: clamp(22px, 6.5vw, 34px);
      font-weight: 400;
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
      outline: none;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: rgba(255,255,255,0);
      transition: background 0.1s;
    }
    .btn:active::after {
      background: rgba(255,255,255,0.15);
    }
    body.light .btn:active::after {
      background: rgba(0,0,0,0.08);
    }
    .btn:active {
      transform: scale(0.93);
    }

    .btn-num {
      background: var(--btn-num);
    }
    .btn-gray {
      background: var(--btn-gray);
      color: #000000;
    }
    
    /* Authentic iOS Orange Button */
    .btn-org {
      background: var(--btn-orange);
      color: #fff;
    }
    .btn-org:active::after {
      background: rgba(255,255,255,0.25);
    }
    .btn-org.lit {
      background: #ffffff;
      color: #ff9500;
    }

    .btn-wide {
      grid-column: span 2;
      border-radius: 999px;
      justify-self: stretch;
      align-self: center;
      max-width: none;
      max-height: 86px;
      aspect-ratio: auto;
      height: 100%;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      padding-left: clamp(22px, 8vw, 36px);
    }
    .btn-sm  { font-size: clamp(16px, 4.5vw, 22px); }
    .btn-dot { font-size: clamp(32px, 9vw, 46px); line-height: 1; padding-bottom: 3px; }

    /* ── FORM ELEMENTS (iOS Translucent Compartments) ── */
    .s-label {
      font-size: 12px;
      color: var(--label);
      margin-bottom: 6px;
    }
    .s-input, .s-select {
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text-main);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .s-input[type="number"]::-webkit-inner-spin-button,
    .s-input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .s-input[type="number"] { -moz-appearance: textfield; }
    .s-input:focus {
      border-color: rgba(255, 149, 0, 0.6);
    }
    .s-select { flex: 0 0 108px; font-size: 14px; cursor: pointer; }
    .s-box {
      background: var(--box-bg);
      border-radius: 16px;
      padding: 14px 16px;
      margin-top: 10px;
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }
    .s-box-lbl { font-size: 12px; color: var(--label); margin-bottom: 4px; }
    .s-box-val {
      font-size: clamp(20px, 5.5vw, 30px);
      font-weight: 300;
      color: var(--text-main);
    }
    .s-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }

    /* Input wrapper */
    .inp-wrap {
      position: relative;
      display: flex;
      align-items: center;
      overflow: hidden;
    }
    .inp-wrap .s-input {
      padding-right: 36px;
      width: 100%;
      min-width: 0;
    }
    .clear-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px; height: 20px;
      border: none; cursor: pointer;
      background: var(--label);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0.7;
      transition: opacity 0.15s;
      padding: 0;
      z-index: 2;
    }
    .clear-btn svg { display: block; }
    .clear-btn:active { opacity: 0.45; }
    .inp-wrap.has-val .clear-btn { display: flex; }

    /* ── PERCENT PANEL ── */
    .pct-wrap {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 18px 18px 16px;
      z-index: 2;
    }
    .pct-num {
      font-size: clamp(46px, 13vw, 70px);
      font-weight: 200;
      color: var(--text-main);
      text-align: right;
      padding-bottom: 10px;
      min-height: 68px;
    }
    .pct-expr {
      font-size: 14px;
      color: var(--text-dim);
      text-align: right;
      margin-bottom: 14px;
    }
    .pct-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .pct-btn {
      padding: 14px 4px;
      border-radius: 14px;
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      background: var(--mode-bg);
      color: var(--text-main);
      backdrop-filter: blur(10px);
      transition: all 0.15s;
    }
    .pct-btn:active { transform: scale(0.96); filter: brightness(0.85); }
    .pct-btn.on {
      background: #ff9500;
      color: #fff;
      border-color: #ff9500;
    }
    .pct-inputs { display: flex; gap: 10px; margin-bottom: 0; }
    .pct-divider {
      height: 1px;
      background: var(--border);
      margin: 10px 0 4px;
      display: none;
    }
    .pct-divider.show { display: block; }
    .pct-rem-val {
      font-size: clamp(18px, 5vw, 26px);
      color: var(--text-dim);
    }

    /* ── CURRENCY PANEL ── */
    .cur-wrap {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 18px 18px 16px;
      z-index: 2;
    }
    .cur-status {
      font-size: 12px;
      text-align: center;
      padding: 0 0 10px;
      color: var(--label);
    }
    .cur-status.loading { color: #ff9500; }
    .cur-status.ok      { color: #34c759; }
    .cur-status.warn    { color: #ff9a00; }
    .cur-status.error   { color: #ff3b30; }
    .cur-result {
      flex: 1;
      display: flex;
      align-items: center;
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 300;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--box-bg);
      color: var(--text-main);
      min-height: 46px;
      pointer-events: none;
    }
    .swap-btn, .refresh-btn {
      display: block;
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      background: var(--mode-bg);
      color: var(--text-main);
      backdrop-filter: blur(10px);
      transition: all 0.15s;
      margin-bottom: 10px;
    }
    .swap-btn:active, .refresh-btn:active { filter: brightness(0.85); transform: scale(0.98); }
    .refresh-btn { margin-top: 10px; margin-bottom: 0; }
    .refresh-btn:disabled { opacity: 0.38; cursor: not-allowed; }

    /* ── DUAL RATE UI ── */
    .cur-status-row {
      display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .cur-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--label);
      background: var(--box-bg); border-radius: 20px;
      padding: 4px 10px; border: 1px solid var(--border);
      flex: 1; min-width: 0;
      backdrop-filter: blur(6px);
    }
    .cur-badge-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .off-dot  { background: #34c759; }
    .live-dot { background: #ff9500; }
    .cur-badge.loading .off-dot,
    .cur-badge.loading .live-dot { background: var(--label); animation: pulse 1.2s infinite; }
    .cur-badge.error .off-dot,
    .cur-badge.error .live-dot   { background: #ff3b30; }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }
    .cur-rate-box { margin-top: 8px; }
    .cur-rate-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 4px;
    }
    .cur-rate-type {
      font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
      padding: 2px 8px; border-radius: 10px;
    }
    .off-type  { background: rgba(52,199,89,0.15);  color: #34c759; }
    .live-type { background: rgba(255,149,0,0.15);  color: #ff9500; }
    .cur-rate-src {
      font-size: 11px; color: var(--label);
    }
    .cur-rate-meta {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--label); margin-top: 4px;
      flex-wrap: wrap; gap: 4px;
    }
    .cur-rate-box.unavailable { opacity: 0.45; }

    /* ── BOTTOM NAV ── */
    .nav {
      flex-shrink: 0;
      display: flex;
      background: var(--nav-bg);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 10;
    }
    .nav-pills {
      display: flex;
      width: 100%;
      position: relative;
      z-index: 1;
    }
    .pill {
      flex: 1;
      border: none;
      cursor: pointer;
      background: transparent;
      color: var(--label);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 8px 4px 10px;
      transition: color 0.18s;
      font-family: inherit;
      position: relative;
      z-index: 2;
    }
    .pill-icon { width: 22px; height: 22px; flex-shrink: 0; }
    .pill-label { font-size: 10px; font-weight: 500; }
    .pill:active { opacity: 0.55; }

    /* Active pill sliding glass highlighter */
    .pill.active { color: #ff9500; }
    .nav-highlighter {
      position: absolute;
      top: 4px;
      left: 0;
      height: calc(100% - 8px);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
      z-index: 1;
      transition: transform 0.26s cubic-bezier(0.25, 1, 0.5, 1), width 0.26s cubic-bezier(0.25, 1, 0.5, 1);
      pointer-events: none;
    }
    body.dragging-tab * {
      user-select: none !important;
      -webkit-user-select: none !important;
      cursor: ew-resize !important;
    }
    body.light .nav-highlighter {
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.55);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .author {
      text-align: center;
      font-size: 10px;
      color: var(--label);
      opacity: 0.55;
      padding: 4px 0 3px;
      pointer-events: none;
      letter-spacing: 0.5px;
    }
    @keyframes swipeDel {
      0% { transform: translateX(0); opacity: 1; filter: blur(0px); }
      30% { transform: translateX(15px); opacity: 0.45; filter: blur(0.6px); }
      100% { transform: translateX(0); opacity: 1; filter: blur(0px); }
    }
    .swiped span {
      animation: swipeDel 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>
<body class="dark">
<div class="calc-bg"></div>
<div class="calc">
  <div class="shine"></div>

  <!-- HISOB -->
  <div id="p-calc" class="panel active">
    <div class="glass-card">
      <div class="display">
        <div class="branding" style="font-size: clamp(8px, 2.5vw, 10px); font-weight: 500; color: var(--text-dim); opacity: 0.38; letter-spacing: 2px; text-transform: uppercase; margin-bottom: auto; text-align: right; padding-right: 4px; pointer-events: none;">Shahriyor Umaraliyev</div>
        <div class="expr" id="expr"></div>
        <div class="result" id="result"><span id="rspan">0</span></div>
      </div>
      <div class="buttons">
        <button class="btn btn-gray" id="btn-back">
          <svg width="26" height="18" viewBox="0 0 28 20" fill="none">

<script>
/* ─── HAPTIC & AUDIO FEEDBACK (AUTHENTIC iOS SYSTEM) ── */
var audioCtx = null;
function triggerFeedback(el) {
  var id = el.id || '';
  var isPill = el.classList.contains('pill') || el.classList.contains('pct-btn') || el.classList.contains('swap-btn') || el.classList.contains('refresh-btn');
  
  // 📳 AUTHENTIC HAPTIC PROFILES (Very micro and gentle)
  if (navigator.vibrate) {
    if (id === 'btn-back') {
      navigator.vibrate(8);
    } else if (id === 'btn-eq' || id === 'btn-ac') {
      navigator.vibrate(10);
    } else if (id === 'btn-add' || id === 'btn-sub' || id === 'btn-mul' || id === 'btn-div' || id === 'btn-pm' || id === 'btn-pct') {
      navigator.vibrate(6);
    } else if (isPill) {
      navigator.vibrate(4);
    } else {
      navigator.vibrate(5);
    }
  }
  
  // 🔊 SENIOR-LEVEL PHYSICAL MODELING AUDIO SYNTHESIZER
  try {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    
    var now = audioCtx.currentTime;
    
    // 1. Decaying warm sine wave (wooden hollow chamber)
    var osc = audioCtx.createOscillator();
    var oscGain = audioCtx.createGain();
    osc.type = 'sine';
    
    // 2. Soft plastic tap transient (bandpass white noise burst)
    var noiseGain = audioCtx.createGain();
    var filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    
    osc.connect(oscGain);
    oscGain.connect(audioCtx.destination);
    
    // Generate organic white noise transient
    var bufferSize = audioCtx.sampleRate * 0.015; // 15ms buffer
    var buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    var data = buffer.getChannelData(0);
    for (var i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }
    
    var noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    noise.connect(filter);
    filter.connect(noiseGain);
    noiseGain.connect(audioCtx.destination);
    
    var duration = 0.035; // Standard iOS duration
    
    if (id === 'btn-back') {
      // iOS Delete: Deep mechanical hollow "tock"
      duration = 0.045;
      osc.frequency.setValueAtTime(320, now);
      osc.frequency.exponentialRampToValueAtTime(140, now + duration);
      oscGain.gain.setValueAtTime(0.24, now);
      oscGain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      
      filter.frequency.setValueAtTime(1200, now);
      filter.Q.setValueAtTime(2.0, now);
      noiseGain.gain.setValueAtTime(0.18, now);
      noiseGain.gain.linearRampToValueAtTime(0.0001, now + 0.006);
      
    } else if (id === 'btn-eq' || id === 'btn-ac') {
      // iOS Confirm/Clear: Rich metallic switch snap
      duration = 0.038;
      osc.frequency.setValueAtTime(460, now);
      osc.frequency.exponentialRampToValueAtTime(220, now + duration);
      oscGain.gain.setValueAtTime(0.22, now);
      oscGain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      
      filter.frequency.setValueAtTime(1600, now);
      filter.Q.setValueAtTime(2.5, now);
      noiseGain.gain.setValueAtTime(0.20, now);
      noiseGain.gain.linearRampToValueAtTime(0.0001, now + 0.006);
      
    } else if (id === 'btn-add' || id === 'btn-sub' || id === 'btn-mul' || id === 'btn-div' || id === 'btn-pm' || id === 'btn-pct') {
      // iOS Operator Action: Quick crisp operator tick
      duration = 0.032;
      osc.frequency.setValueAtTime(500, now);
      osc.frequency.exponentialRampToValueAtTime(240, now + duration);
      oscGain.gain.setValueAtTime(0.18, now);
      oscGain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      
      filter.frequency.setValueAtTime(1800, now);
      filter.Q.setValueAtTime(3.0, now);
      noiseGain.gain.setValueAtTime(0.15, now);
      noiseGain.gain.linearRampToValueAtTime(0.0001, now + 0.004);
      
    } else if (isPill) {
      // iOS Tab Pop: Airy bubble popping click
      duration = 0.040;
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.exponentialRampToValueAtTime(280, now + duration);
      oscGain.gain.setValueAtTime(0.14, now);
      oscGain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      
      filter.frequency.setValueAtTime(1400, now);
      filter.Q.setValueAtTime(2.0, now);
      noiseGain.gain.setValueAtTime(0.08, now);
      noiseGain.gain.linearRampToValueAtTime(0.0001, now + 0.005);
      
    } else {
      // iOS Standard Key Tap: Extremely crisp, woody "tock" (100% realistic iPhone keyboard sound)
      duration = 0.035;
      osc.frequency.setValueAtTime(420, now);
      osc.frequency.exponentialRampToValueAtTime(200, now + duration);
      oscGain.gain.setValueAtTime(0.20, now);
      oscGain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      
      filter.frequency.setValueAtTime(1500, now);
      filter.Q.setValueAtTime(2.5, now);
      noiseGain.gain.setValueAtTime(0.16, now);
      noiseGain.gain.linearRampToValueAtTime(0.0001, now + 0.005);
    }
    
    osc.start(now);
    osc.stop(now + duration + 0.01);
    noise.start(now);
    noise.stop(now + duration + 0.01);
  } catch (e) {
    console.warn("Feedback audio failed to synthesize:", e);
  }
}

// Global delegated listener for instantaneous click/touch feedback (pointerdown for 0ms latency)
document.addEventListener('pointerdown', function(e) {
  var el = e.target;
  while (el && el !== document.body) {

      el.classList.contains('swap-btn') ||

});

/* ─── TABS ──────────────────────────────────────────── */
var TABS = { calc:'p-calc', pct:'p-pct', cur:'p-cur' };
var curTab = 'calc';
var tabsOrder = ['calc', 'pct', 'cur'];

function updateNavHighlighter() {
  var highlighter = document.getElementById('nav-highlighter');
  var activePill = document.querySelector('.pill.active');
  if (!highlighter || !activePill) return;
  
  var pills = Array.prototype.slice.call(activePill.parentElement.querySelectorAll('.pill'));
  var index = pills.indexOf(activePill);
  if (index === -1) return;
  
  var pillWidthPercent = 100 / pills.length;
  var leftPercent = index * pillWidthPercent;
  
  // 100% hardware-accelerated CSS calc transition, immune to DOM reflow latency
  highlighter.style.width = 'calc(' + pillWidthPercent + '% - 8px)';
  highlighter.style.transform = 'translateX(calc(' + leftPercent + '% + 4px))';
}

function switchTab(t) {
  if (curTab === t) return;
  
  var oldIndex = tabsOrder.indexOf(curTab);
  var newIndex = tabsOrder.indexOf(t);
  var direction = newIndex > oldIndex ? 'forward' : 'backward';

  var oldPanel = document.getElementById(TABS[curTab]);
  oldPanel.classList.remove('active', 'anim-forward', 'anim-backward');
  document.getElementById('nb-' + curTab).classList.remove('active');

  curTab = t;

  var panel = document.getElementById(TABS[t]);
  panel.classList.add('active');
  panel.classList.remove('anim-forward', 'anim-backward');
  void panel.offsetWidth; // trigger reflow
  
  if (direction === 'forward') {
    panel.classList.add('anim-forward');
  } else {
    panel.classList.add('anim-backward');
  }

  document.getElementById('nb-' + t).classList.add('active');
  
  // Update sliding glass highlighter position dynamically!
  updateNavHighlighter();
  
  if (t === 'cur' && !curState.official && !curState.live) loadRates();
}

/* ─── CALCULATOR ────────────────────────────────────── */
/* ─── AUTHENTIC iOS 18 EQUATION-BASED ENGINE (SENIOR LEVEL) ─── */
var equation = '0';             // Holds the running equation (e.g. "2×9") or result
var isCalculated = false;       // True if current display is a calculated result
var calculatedEquation = '';   // Holds the equation that was just solved
var lastOperator = null;        // For repeating operations on repeated '=' clicks
var lastOperand = null;         // For repeating operations on repeated '=' clicks

var rspanEl  = document.getElementById('rspan');
var resultEl = document.getElementById('result');
var exprEl   = document.getElementById('expr');
var acBtn    = document.getElementById('btn-ac');

// operator buttons map
var opBtns   = {
  '+': document.getElementById('btn-add'),
  '−': document.getElementById('btn-sub'),
  '×': document.getElementById('btn-mul'),
  '÷': document.getElementById('btn-div')
};

// Check if character is a binary operator
function isOperator(ch) {
  return ['+', '−', '×', '÷'].indexOf(ch) !== -1;
}

// Tokenize the equation string into numbers and operators
function tokenize(str) {
  var tokens = [];
  var i = 0;
  while (i < str.length) {
    var ch = str[i];
    if (ch === ' ') {
      i++;
      continue;
    }
    if (['+', '×', '÷'].indexOf(ch) !== -1) {
      // Map to standard operators for computation
      var mapped = ch === '×' ? '*' : (ch === '÷' ? '/' : '+');
      tokens.push({ type: 'OP', val: mapped });
      i++;
    } else if (ch === '−') {
      // Check if unary minus vs binary minus
      var prev = tokens[tokens.length - 1];
      if (!prev || prev.type === 'OP') {
        // Unary minus: read the number following it
        var numStr = '-';
        i++;
        while (i < str.length && (/[0-9.]/.test(str[i]))) {
          numStr += str[i];
          i++;
        }
        if (numStr === '-') {
          // Just a minus sign alone? Treat as operator
          tokens.push({ type: 'OP', val: '-' });
        } else {
          tokens.push({ type: 'NUM', val: parseFloat(numStr) });
        }
      } else {
        // Binary minus
        tokens.push({ type: 'OP', val: '-' });
        i++;
      }
    } else if (/[0-9.]/.test(ch)) {
      var numStr = '';
      while (i < str.length && (/[0-9.]/.test(str[i]))) {
        numStr += str[i];
        i++;
      }
      tokens.push({ type: 'NUM', val: parseFloat(numStr) });
    } else {
      i++;
    }
  }
  return tokens;
}

// Evaluate token array with correct mathematical precedence (BODMAS)
function evaluateTokens(tokens) {
  if (tokens.length === 0) return 0;

  // First pass: multiplication and division
  var i = 0;
  var mulDivTokens = [];
  while (i < tokens.length) {
    var token = tokens[i];
    if (token.type === 'OP' && (token.val === '*' || token.val === '/')) {
      var prev = mulDivTokens.pop();
      var next = tokens[i + 1];
      if (!prev || !next || prev.type !== 'NUM' || next.type !== 'NUM') {
        return null;
      }
      var res;
      if (token.val === '*') {
        res = prev.val * next.val;
      } else {
        if (next.val === 0) return null; // Division by zero
        res = prev.val / next.val;
      }
      mulDivTokens.push({ type: 'NUM', val: res });
      i += 2;
    } else {
      mulDivTokens.push(token);
      i++;
    }
  }

  // Second pass: addition and subtraction
  if (mulDivTokens.length === 0) return 0;
  var resultVal = mulDivTokens[0].val;
  if (mulDivTokens[0].type !== 'NUM') return null;

  var j = 1;
  while (j < mulDivTokens.length) {
    var opToken = mulDivTokens[j];
    var numToken = mulDivTokens[j + 1];
    if (!opToken || !numToken || opToken.type !== 'OP' || numToken.type !== 'NUM') {
      return null;
    }
    if (opToken.val === '+') {
      resultVal += numToken.val;
    } else if (opToken.val === '-') {
      resultVal -= numToken.val;
    } else {
      return null;
    }
    j += 2;
  }

  return resultVal;
}

// Full equation evaluator
function evaluateEquation(eqStr) {
  var tokens = tokenize(eqStr);
  var r = evaluateTokens(tokens);
  if (r === null) return null;
  // Fix precision floating point bugs exactly like iPhone (limit to 12 digits)
  return parseFloat(r.toPrecision(12));
}

// Scan equation from right to left to extract last operator and operand (for repeated equals)
function extractLastOpAndOperand(eqStr) {
  var i = eqStr.length - 1;
  while (i >= 0 && eqStr[i] === ' ') i--;
  
  // Find last number segment
  while (i >= 0 && (/[0-9.]/.test(eqStr[i]))) {
    i--;
  }
  
  // Check unary minus
  if (i >= 0 && eqStr[i] === '−') {
    if (i === 0 || isOperator(eqStr[i - 1])) {
      i--;
    }
  }
  
  if (i >= 0 && isOperator(eqStr[i])) {
    var op = eqStr[i];
    var operandStr = eqStr.slice(i + 1);
    var operand = parseFloat(operandStr.replace(/−/g, '-'));
    return { op: op, operand: operand };
  }
  return null;
}

// Format numbers inside an equation string with commas (e.g. "12500.5×9" -> "12,500.5×9")
function formatEquation(eqStr) {
  if (eqStr === 'Xato') return 'Xato';
  return eqStr.replace(/[0-9.]+/g, function(numStr) {
    var parts = numStr.split('.');
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return parts.join('.');
  });
}

// Set display font sizes dynamically based on text length to prevent clipping
function setFontSize(dispText) {
  var L = dispText.replace(/[,.\-−]/g, '').length;
  resultEl.style.fontSize =
    L <= 6  ? 'clamp(44px,12vw,68px)'  :
    L <= 9  ? 'clamp(34px,9vw,52px)'   :
    L <= 12 ? 'clamp(26px,7vw,40px)'   :
              'clamp(18px,5vw,28px)';
}

function animPop() {

}

// Can we append a digit based on the 9-digit limit of the last number segment?
function canAppendDigit() {
  if (isCalculated) return true;
  var segments = equation.split(/[+−×÷]/);
  var lastSegment = segments[segments.length - 1] || '';
  var digitCount = lastSegment.replace(/[.−]/g, '').length;
  return digitCount < 9;
}

    }

  var i = equation.length - 1;
  var end = i + 1;
  while (i >= 0 && (/[0-9.]/.test(equation[i]))) {
    i--;
  }
  
  var hasUnaryMinus = false;
  if (i >= 0 && equation[i] === '−' && (i === 0 || isOperator(equation[i - 1]))) {
    hasUnaryMinus = true;
    i--;
  }
  
  var start = i + 1;
  var numStr = equation.slice(start, end);
  var val = parseFloat(numStr.replace(/−/g, '-'));
  if (!isNaN(val)) {
    var r = val / 100;
    var formatted = String(parseFloat(r.toPrecision(12))).replace(/-/g, '−');
    equation = equation.slice(0, start) + formatted + equation.slice(end);
    render();
    animPop();
  }
});

// Operators (+, −, ×, ÷)
function handleOp(newOp) {
  if (equation === 'Xato') return;

  if (isCalculated) {
    equation = equation + newOp;
    isCalculated = false;
    calculatedEquation = '';
    render();
    return;
  }

  if (equation.slice(-1) === '.') {
    equation = equation.slice(0, -1);
  }

  if (equation.length >= 2) {
    var last2 = equation.slice(-2);
    if (isOperator(last2[0]) && last2[1] === '−') {
      equation = equation.slice(0, -2) + newOp;
      render();
      return;
    }
  }

  if (isOperator(equation.slice(-1))) {
    equation = equation.slice(0, -1) + newOp;
    render();
    return;
  }

  equation += newOp;
  render();
}

// Equal (=) Button
document.getElementById('btn-eq').addEventListener('click', function() {
  if (equation === 'Xato') return;

  if (isCalculated) {
    if (lastOperator && lastOperand !== null) {
      var currentVal = parseFloat(equation.replace(/−/g, '-'));
      if (!isNaN(currentVal)) {
        var opChar = lastOperator === '*' ? '×' : (lastOperator === '/' ? '÷' : lastOperator);
        var operandStr = String(lastOperand).replace(/-/g, '−');
        var newEq = String(currentVal).replace(/-/g, '−') + opChar + operandStr;
        
        var r = evaluateEquation(newEq);
        if (r === null) {
          equation = 'Xato';
          calculatedEquation = '';
          isCalculated = false;
        } else {
          calculatedEquation = newEq;
          equation = String(r).replace(/-/g, '−');
          isCalculated = true;
        }
      }
    }
    render();
    animPop();
    return;
  }

  var extracted = extractLastOpAndOperand(equation);
  if (extracted) {
    lastOperator = extracted.op === '×' ? '*' : (extracted.op === '÷' ? '/' : extracted.op);
    lastOperand = extracted.operand;
  } else {
    lastOperator = null;
    lastOperand = null;
  }

  var parseEq = equation;
  if (isOperator(parseEq.slice(-1))) {
    parseEq = parseEq.slice(0, -1);
  }

  var r = evaluateEquation(parseEq);
  if (r === null) {
    equation = 'Xato';
    calculatedEquation = '';
    isCalculated = false;
  } else {
    calculatedEquation = equation;
    equation = String(r).replace(/-/g, '−');
    isCalculated = true;
  }

  render();
  animPop();
});

/* Formatlash yordamchilari */
function stripFmt(s) {
  /* Bo'sh joy va vergullarni olib tashlash, sof raqam qoldirish */
  return (s || '').replace(/[\s,]/g, '');
}

function addSpaces(s) {
  /* "1000000.5" → "1 000 000.5", "2." → "2." (nuqta saqlanadi) */
  if (!s) return '';
  var hasDot   = s.indexOf('.') !== -1;
  var parts    = s.split('.');
  parts[0]     = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
  /* Bo'sh kasr qism ham saqlanadi: "2." → "2." */
  return hasDot ? parts[0] + '.' + (parts[1] || '') : parts[0];
}

function fmtInp(el, wrapId) {
  var val    = el.value;
  var cursor = el.selectionEnd || 0;

  /* Sof raqam */
  var raw   = stripFmt(val).replace(/[^0-9.]/g, '');
  var parts = raw.split('.');
  if (parts.length > 2) raw = parts[0] + '.' + parts.slice(1).join('');

  /* pct-rate uchun minglik ajratish shart emas */
  var formatted = (wrapId === 'wrap-pct-rate') ? raw : addSpaces(raw);

  if (el.value !== formatted) {
    /* Kursordan oldin nechta raqam va nuqta bor edi */
    var before     = val.slice(0, cursor);
    var digsBefore = before.replace(/[^0-9]/g, '').length;
    var hasDotBefore = before.indexOf('.') !== -1;

    el.value = formatted;

    /* Yangi pozitsiya: raqamlar soniga qarab topamiz */
    var digs = 0;
    var pos  = formatted.length;
    for (var i = 0; i < formatted.length; i++) {
      var ch = formatted[i];
      if (/[0-9]/.test(ch)) {
        digs++;
        if (digs === digsBefore && !hasDotBefore) { pos = i + 1; break; }
      } else if (ch === '.') {
        if (hasDotBefore && digs === digsBefore) { pos = i + 1; break; }
      }
    }
    /* Agar barcha raqamlar hisoblandiyam topilmasa — oxiriga */
    if (digs < digsBefore) pos = formatted.length;
    try { el.setSelectionRange(pos, pos); } catch(e) {}
  }

  /* Clear tugmasi */
  var wrap = document.getElementById(wrapId);
  if (wrap) {
    if (raw) wrap.classList.add('has-val');
    else wrap.classList.remove('has-val');
  }
}

function clearInp(id, wrapId) {
  var el = document.getElementById(id);
  el.value = '';
  var wrap = document.getElementById(wrapId);
  if (wrap) wrap.classList.remove('has-val');
  el.focus();
}

function getRawVal(id) {
  var raw = stripFmt(document.getElementById(id).value);
  /* Oxirida nuqta bo'lsa — hali yozilmagan, NaN qaytaramiz */
  if (raw.slice(-1) === '.') return NaN;
  return parseFloat(raw) || 0;
}
var pctMode = 'tip';

function setPct(mode) {
  pctMode = mode;
  ['tip','disc','mark','tax'].forEach(function(m){
    document.getElementById('pb-' + m).classList.remove('on');
  });
  var map = { tip:'pb-tip', disc:'pb-disc', markup:'pb-mark', tax:'pb-tax' };
  if (map[mode]) document.getElementById(map[mode]).classList.add('on');
  var labels = {
    tip:    'Foiz miqdori',
    disc:   'Chegirma hisoblash',
    markup: 'Ustama narx',
    tax:    "Soliq qo'shish"
  };
  document.getElementById('pct-expr').textContent = labels[mode] || '';
  calcPct();
}

function money(n) {
  return Math.round(n).toLocaleString('uz-UZ') + " so'm";
}

function calcPct() {
  var base = getRawVal('pct-base');
  var rate = getRawVal('pct-rate');
  var num  = document.getElementById('pct-num');
  var lbl  = document.getElementById('pct-lbl');
  var val  = document.getElementById('pct-val');
  var sub  = document.getElementById('pct-sub');
  var div  = document.getElementById('pct-divider');
  var remLbl = document.getElementById('pct-rem-lbl');
  var rem    = document.getElementById('pct-rem');

  if (isNaN(base) || isNaN(rate) || !isFinite(base) || !isFinite(rate) || base <= 0 || rate <= 0) {
    num.textContent    = '—';
    val.textContent    = '—';
    sub.textContent    = '';
    rem.textContent    = '—';
    remLbl.textContent = '';
    div.className      = 'pct-divider';
    return;
  }

  var amt     = base * rate / 100;
  var fmtBase = addSpaces(String(Math.round(base)));
  var formula = fmtBase + ' × ' + rate + '% = ' + money(amt);
  div.className = 'pct-divider show';

  if (pctMode === 'disc') {
    var result = base - amt;
    val.textContent    = money(result);
    lbl.textContent    = 'Chegirmali narx';
    sub.textContent    = formula;
    num.textContent    = '−' + rate + '%';
    remLbl.textContent = 'Qoldiq (chegirma miqdori)';
    rem.textContent    = money(amt);

  } else if (pctMode === 'markup') {
    var result = base + amt;
    val.textContent    = money(result);
    lbl.textContent    = 'Ustama bilan narx';
    sub.textContent    = formula;
    num.textContent    = '+' + rate + '%';
    remLbl.textContent = 'Asl narx (ustama siz)';
    rem.textContent    = money(base);

  } else if (pctMode === 'tax') {
    var result = base + amt;
    val.textContent    = money(result);
    lbl.textContent    = 'Soliq bilan jami';
    sub.textContent    = formula;
    num.textContent    = '+' + rate + '%';
    remLbl.textContent = 'Soliqqacha narx';
    rem.textContent    = money(base);

  } else {
    /* tip — foiz miqdori */
    val.textContent    = money(amt);
    lbl.textContent    = 'Foiz miqdori';
    sub.textContent    = formula;
    num.textContent    = money(amt).replace(" so'm", '');
    remLbl.textContent = 'Qoldiq (foiz chiqarilgandan keyin)';
    rem.textContent    = money(base - amt);
  }
}

/* ═══════════════════════════════════════════════════════
   VALYUTA MODULI — Backend-first arxitektura
   ═══════════════════════════════════════════════════════

   LocalStorage: oxirgi muvaffaqiyatli kurslar (TTL: 24h)
   ═══════════════════════════════════════════════════════ */

var CUR = {
  LS_KEY:        'kalk_cur_v3',
  BACKEND_URL:   '/api/rates',
  LIVE_TTL:       15 * 60 * 1000,
  OFF_TTL:        60 * 60 * 1000,
  RETRY_ERROR:     5 * 60 * 1000,
  FETCH_TIMEOUT:   8 * 1000,
  LS_TTL:         24 * 60 * 60 * 1000,   /* 24 soat */
  CURRENCIES:    ['USD','UZS','EUR','RUB','AED','GBP','KZT']
};

var curState = {
  official: null,
  live:     null,
  timers:   { official: null, live: null, refresh: null },
  loading:  { official: false, live: false }
};

/* ── LocalStorage — TTL bilan ── */
var LS = {
  save: function(official, live) {
    try {
      localStorage.setItem(CUR.LS_KEY, JSON.stringify({
        official: official || null,
        live:     live     || null,
        savedAt:  Date.now()
      }));
    } catch(e) {}
  },
  load: function() {
    try {
      var raw = localStorage.getItem(CUR.LS_KEY);
      if (!raw) return { official: null, live: null };
      var data = JSON.parse(raw);
      /* TTL tekshiruvi — 24 soatdan eski bo'lsa ishlatmaymiz */
      if (Date.now() - (data.savedAt || 0) > CUR.LS_TTL) {
        localStorage.removeItem(CUR.LS_KEY);
        return { official: null, live: null };
      }
      return data;
    } catch(e) { return { official: null, live: null }; }
  }
};

/* ── Vaqt formatlash ── */
function fmtTime(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  return String(d.getHours()).padStart(2,'0') + ':'
       + String(d.getMinutes()).padStart(2,'0');
}

/* ── Sana formatlash — har qanday formatdan M.DD.YYYY ga ── */
function fmtDate(str) {
  if (!str) return '';
  var d;

  /* "22.03.2026" — CBU formati */
  var m1 = str.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if (m1) {
    d = new Date(parseInt(m1[3]), parseInt(m1[2])-1, parseInt(m1[1]));
  }
  /* "2026-03-22" — ISO formati */
  else if (/^\d{4}-\d{2}-\d{2}/.test(str)) {
    d = new Date(str);
  }
  /* Boshqa formatlar — Date parse */
  else {
    d = new Date(str);
  }

  if (!d || isNaN(d.getTime())) return str;
  return (d.getMonth()+1) + '.' + String(d.getDate()).padStart(2,'0') + '.' + d.getFullYear();
}

/* ── Timeout bilan fetch ── */
function fetchT(url) {
  if (!window.AbortController) return fetch(url, { cache: 'no-store' });
  var ctrl  = new AbortController();
  var timer = setTimeout(function(){ ctrl.abort(); }, CUR.FETCH_TIMEOUT);
  return fetch(url, { signal: ctrl.signal, cache: 'no-store' })
    .finally(function(){ clearTimeout(timer); });
}

/* ══════════════════════════════════════════════
   BACKEND — asosiy manba
   /api/rates → { official, live, serverTime }
   ══════════════════════════════════════════════ */
function fetchFromBackend() {
  return fetchT(CUR.BACKEND_URL)
    .then(function(r) {
      if (!r.ok) throw new Error('backend http ' + r.status);
      return r.json();
    })
    .then(function(data) {
      if (!data.official && !data.live) throw new Error('backend empty');
      /* fetchedAt ni frontend qo'yadi */
      var now = Date.now();
      if (data.official) data.official.fetchedAt = now;
      if (data.live)     data.live.fetchedAt     = now;
      /* Eski kurs bo'lsa badge da ko'rsatamiz */
      data._isToday = data.isToday !== false;
      return data;
    });
}

var CBU_PROXIES = [
  {
    url: 'https://api.allorigins.win/get?url=' +
         encodeURIComponent('https://cbu.uz/ru/arkhiv-kursov-valyut/json/'),
    parse: function(d) {
      var arr = JSON.parse(d.contents);
      return parseCbuArr(arr);
    }
  },
  {
    url: 'https://corsproxy.io/?' +
         encodeURIComponent('https://cbu.uz/ru/arkhiv-kursov-valyut/json/'),
    parse: function(d) {
      var arr = Array.isArray(d) ? d : JSON.parse(d);
      return parseCbuArr(arr);
    }
  }
];

function parseCbuArr(arr) {
  if (!Array.isArray(arr) || arr.length === 0) throw new Error('empty cbu');
  var rates = { UZS: 1 };
  arr.forEach(function(item) {
    if (CUR.CURRENCIES.indexOf(item.Ccy) !== -1 && item.Ccy !== 'UZS') {
      var r = parseFloat(item.Rate);
      var n = parseFloat(item.Nominal) || 1;
      if (r > 0) rates[item.Ccy] = r / n;
    }
  });
  if (!rates.USD) throw new Error('no USD');
  return {
    rates:         rates,
    source:        'cbu (direct)',
    effectiveDate: arr[0] ? (arr[0].Date || '') : '',
    fetchedAt:     Date.now(),
    type:          'official'
  };
}

function fetchOfficialDirect(idx) {
  if (idx >= CBU_PROXIES.length) return Promise.reject(new Error('cbu failed'));
  var p = CBU_PROXIES[idx];
  return fetchT(p.url)
    .then(function(r) {
      if (!r.ok) throw new Error('http ' + r.status);
      return r.json();
    })
    .then(function(data) { return p.parse(data); })
    .catch(function() { return fetchOfficialDirect(idx + 1); });
}

function parseFawaz(d) {
  var usdData = d.usd || d.USD;
  if (!usdData) throw new Error('no usd');
  var uzsPerUsd = usdData['uzs'];
  if (!uzsPerUsd || uzsPerUsd <= 0) throw new Error('no uzs');
  var rates = { UZS: 1, USD: uzsPerUsd };
  ['eur','rub','aed','gbp','kzt'].forEach(function(k) {
    var v = usdData[k];
    if (v && v > 0) rates[k.toUpperCase()] = uzsPerUsd / v;
  });
  return {
    rates:         rates,
    source:        'fawazahmed0',
    effectiveDate: d.date || '',
    fetchedAt:     Date.now(),
    type:          'market'
  };
}

var LIVE_PROVIDERS = [
  {
    url:   'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.min.json',
    parse: parseFawaz
  },
  {
    url:   'https://latest.currency-api.pages.dev/v1/currencies/usd.min.json',
    parse: parseFawaz
  },
  {
    url: 'https://open.er-api.com/v6/latest/USD',
    parse: function(d) {
      if (!d.rates) throw new Error('no rates');
      var uzsPerUsd = d.rates['UZS'];
      if (!uzsPerUsd || uzsPerUsd <= 0) throw new Error('no uzs');
      var rates = { UZS: 1, USD: uzsPerUsd };
      ['EUR','RUB','AED','GBP','KZT'].forEach(function(k) {
        var v = d.rates[k];
        if (v && v > 0) rates[k] = uzsPerUsd / v;
      });
      return {
        rates:         rates,
        source:        'open.er-api',
        effectiveDate: d.time_last_update_utc || '',
        fetchedAt:     Date.now(),
        type:          'market'
      };
    }
  }
];

function fetchLiveDirect(idx) {
  if (idx >= LIVE_PROVIDERS.length) return Promise.reject(new Error('live failed'));
  var p = LIVE_PROVIDERS[idx];
  return fetchT(p.url)
    .then(function(r) {
      if (!r.ok) throw new Error('http ' + r.status);
      return r.json();
    })
    .then(function(data) { return p.parse(data); })
    .catch(function() { return fetchLiveDirect(idx + 1); });
}

/* ══════════════════════════════════════════════
   UI yangilash
   ══════════════════════════════════════════════ */
function setBadge(type, state, text) {
  var badge = document.getElementById(type + '-badge');
  var txt   = document.getElementById(type + '-st-txt');
  if (!badge || !txt) return;
  badge.className = 'cur-badge ' + state;
  txt.textContent = text;
}

function setRateBox(type, data, from, to) {
  var box     = document.getElementById(type + '-box');
  var rateEl  = document.getElementById(type + '-rate');
  var srcEl   = document.getElementById(type + '-src');
  var dateEl  = document.getElementById(type + '-date');
  var fetchEl = document.getElementById(type + '-fetched');
  if (!box) return;

  if (!data) {
    box.classList.add('unavailable');
    rateEl.textContent  = "Ma'lumot yo'q";
    srcEl.textContent   = '—';
    dateEl.textContent  = '';
    fetchEl.textContent = '';
    return;
  }
  box.classList.remove('unavailable');

  var fRate = getFromData(data, from);
  var tRate = getFromData(data, to);
  if (fRate && tRate) {
    var rate    = fRate / tRate;
    var isLarge = (to === 'UZS' || to === 'KZT');
    rateEl.textContent = '1 ' + from + ' = '
      + rate.toLocaleString('uz-UZ', { maximumFractionDigits: isLarge ? 0 : 4 })
      + ' ' + to;
  } else {
    rateEl.textContent = 'Kurs topilmadi';
  }

  srcEl.textContent   = data.source        || '—';
  dateEl.textContent  = data.effectiveDate  ? (fmtDate(data.effectiveDate))         : '';
  fetchEl.textContent = data.fetchedAt      ? ('Yangilandi: ' + fmtTime(data.fetchedAt)) : '';
}

function getFromData(data, ccy) {
  if (!data || !data.rates) return null;
  if (ccy === 'UZS') return 1;
  var r = data.rates[ccy];
  return (r !== undefined && r > 0) ? r : null;
}

/* ══════════════════════════════════════════════
   Konvertatsiya
   ══════════════════════════════════════════════ */
function convert() {
  var from  = document.getElementById('from-c').value;
  var to    = document.getElementById('to-c').value;
  var amt   = getRawVal('cur-amt');
  var resEl = document.getElementById('cur-res');

  /* Nuqta kiritilayotganda natijani tozalaymiz lekin kurs qutilari yangilansin */
  if (isNaN(amt)) {
    resEl.textContent = '—';
    setRateBox('off',  curState.official, from, to);
    setRateBox('live', curState.live,     from, to);
    return;
  }

  /* Live ustunlik qiladi */
  var data = curState.live || curState.official;

  if (!data) {
    resEl.textContent = '—';
    setRateBox('off',  curState.official, from, to);
    setRateBox('live', curState.live,     from, to);
    return;
  }

  var fRate = getFromData(data, from);
  var tRate = getFromData(data, to);

  if (!fRate || !tRate || !isFinite(amt) || amt <= 0) {
    resEl.textContent = amt > 0 ? "Kurs yo'q" : '—';
  } else {
    var result  = (amt * fRate) / tRate;
    var isLarge = (to === 'UZS' || to === 'KZT');
    resEl.textContent = isFinite(result)
      ? result.toLocaleString('uz-UZ', { maximumFractionDigits: isLarge ? 0 : (to === 'RUB' ? 1 : 4) })
      : '—';
  }

  setRateBox('off',  curState.official, from, to);
  setRateBox('live', curState.live,     from, to);
}

function swapCur() {
  var f = document.getElementById('from-c');
  var t = document.getElementById('to-c');
  var tmp = f.value; f.value = t.value; t.value = tmp;
  convert();
}

/* ══════════════════════════════════════════════
   Asosiy yuklovchi
   ══════════════════════════════════════════════ */
function applyData(official, live) {
  if (official) curState.official = official;
  if (live)     curState.live     = live;
  LS.save(curState.official, curState.live);
  convert();
}

function scheduleRefresh(ms) {
  if (curState.timers.refresh) clearTimeout(curState.timers.refresh);
  curState.timers.refresh = setTimeout(function() { fetchAndApply(); }, ms);
}

function fetchAndApply() {
  /* 1-urinish: backend */
  fetchFromBackend()
    .then(function(data) {
      applyData(data.official, data.live);

      var offLabel  = data.officialToday ? 'Rasmiy kurs — ' + fmtDate(data.official && data.official.effectiveDate) : '⚠️ Rasmiy kurs (kecha)';
      var liveLabel = data.live
        ? ('Jonli kurs' + (data.liveAgeMin !== null ? ' — ' + data.liveAgeMin + ' daq. oldin' : ''))
        : null;

      if (data.official) setBadge('off',  'ok',    offLabel);
      else               setBadge('off',  'error', "Rasmiy kurs yo'q");
      if (data.live)     setBadge('live', 'ok',    liveLabel);
      else               setBadge('live', 'error', "Jonli kurs yo'q");

      scheduleRefresh(CUR.LIVE_TTL);
    })
    .catch(function() {
      /* 2-urinish: to'g'ridan */
      setBadge('off',  'loading', 'Rasmiy kurs yuklanmoqda...');
      setBadge('live', 'loading', 'Jonli kurs yuklanmoqda...');

      Promise.allSettled([
        fetchOfficialDirect(0),
        fetchLiveDirect(0)
      ]).then(function(results) {
        var official = results[0].status === 'fulfilled' ? results[0].value : null;
        var live     = results[1].status === 'fulfilled' ? results[1].value : null;

        if (official) {
          applyData(official, null);
          setBadge('off', 'ok', 'Rasmiy kurs — ' + fmtDate(official.effectiveDate));
        } else {
          setBadge('off', 'error', curState.official
            ? 'Rasmiy kurs (kesh) — ' + fmtDate(curState.official.effectiveDate)
            : "Rasmiy kurs mavjud emas");
        }

        if (live) {
          applyData(null, live);
          setBadge('live', 'ok', 'Jonli kurs — ' + fmtTime(live.fetchedAt));
        } else {
          setBadge('live', 'error', curState.live
            ? 'Jonli kurs (kesh) — ' + fmtTime(curState.live.fetchedAt)
            : "Jonli kurs mavjud emas");
        }

        scheduleRefresh(official || live ? CUR.LIVE_TTL : CUR.RETRY_ERROR);
      });
    });
}

function loadRates() {
  /* 1. LocalStorage dan tez ko'rsatamiz */
  var cached = LS.load();
  if (cached.official) {
    curState.official = cached.official;
    setBadge('off', 'cache', 'Rasmiy kurs (kesh) — ' + fmtDate(cached.official.effectiveDate));
  }
  if (cached.live) {
    curState.live = cached.live;
    setBadge('live', 'cache', 'Jonli kurs (kesh) — ' + fmtTime(cached.live.fetchedAt));
  }
  if (cached.official || cached.live) convert();

  /* 2. Orqada yangilaymiz */
  fetchAndApply();
}

/* Qo'lda yangilash — faqat KV dan o'qiydi, API ga urmaydi */
var lastManualRefresh = 0;
window.onRefreshRates = function() {
  var now  = Date.now();
  var wait = 10 * 1000; /* 10 soniya debounce */
  if (now - lastManualRefresh < wait) return;
  lastManualRefresh = now;
  fetchAndApply();
};

/* Sahifa to'liq yuklangandan keyin kurslarni yuklash */
window.addEventListener('load', function() { loadRates(); });

document.addEventListener('touchmove', function(e) {

    return; // Allow native scrolling in scrollable compartments
  }

/* ─── SWIPE TO DELETE GESTURE (CEO LEVEL) ───────────── */
(function() {
  var startX = 0;
  var startY = 0;
  var displayEl = document.querySelector('.display');
  
  if (!displayEl) return;
  
  function handleStart(x, y) {
    startX = x;
    startY = y;
  }
  
  function handleEnd(endX, endY) {
    var diffX = endX - startX;
    var diffY = endY - startY;
    
    // Horizontal swipe: horizontal shift > 50px, vertical shift < 30px
    if (Math.abs(diffX) > 50 && Math.abs(diffY) < 30) {
      if (deleteLastDigit()) {
        // 1. Play the mechanical Backspace woody click and tactile vibration!
        var mockEl = { id: 'btn-back', classList: { contains: function() { return false; } } };
        triggerFeedback(mockEl);
        
        // 2. Trigger gorgeous slide-and-fade organic iOS text transition!
        resultEl.classList.remove('swiped');
        void resultEl.offsetWidth; // trigger reflow to restart CSS animation
        resultEl.classList.add('swiped');
        
        render();
      }
    }
  }
  
  // Mobile touch support
  displayEl.addEventListener('touchstart', function(e) {
    var t = e.touches[0];
    handleStart(t.clientX, t.clientY);
  }, { passive: true });
  
  displayEl.addEventListener('touchend', function(e) {
    var t = e.changedTouches[0];
    handleEnd(t.clientX, t.clientY);
  }, { passive: true });
  
  // Desktop mouse drag support
  var isMouseDown = false;
  displayEl.addEventListener('mousedown', function(e) {
    isMouseDown = true;
    handleStart(e.clientX, e.clientY);
  });
  
  document.addEventListener('mouseup', function(e) {
    if (!isMouseDown) return;
    isMouseDown = false;
    handleEnd(e.clientX, e.clientY);
  });
})();

/* ─── HOME INDICATOR SWIPE TO SWITCH TABS (IPHONE GESTURE) ─── */
(function() {
  var startX = 0;
  var startY = 0;
  var bottomArea = document.querySelector('.nav');
  var indicatorBar = document.getElementById('home-indicator-bar');
  
  if (!bottomArea || !indicatorBar) return;

  var tabsOrder = ['calc', 'pct', 'cur'];

  function handleStart(x, y) {
    startX = x;
    startY = y;
  }

  function handleEnd(endX, endY) {
    var diffX = endX - startX;
    var diffY = endY - startY;

    // Minimum horizontal swipe of 45px, vertical tolerance of 40px
    if (Math.abs(diffX) > 45 && Math.abs(diffY) < 40) {
      var currentIndex = tabsOrder.indexOf(curTab);
      if (currentIndex === -1) return;

      if (diffX < 0) {
        // Swipe Left -> next tab (calc -> pct -> cur)
        if (currentIndex < tabsOrder.length - 1) {
          var nextTab = tabsOrder[currentIndex + 1];
          switchTab(nextTab);
          var mockEl = { id: 'nb-' + nextTab, classList: { contains: function(c) { return c === 'pill'; } } };
          triggerFeedback(mockEl);
        }
      } else {
        // Swipe Right -> previous tab (cur -> pct -> calc)
        if (currentIndex > 0) {
          var prevTab = tabsOrder[currentIndex - 1];
          switchTab(prevTab);
          var mockEl = { id: 'nb-' + prevTab, classList: { contains: function(c) { return c === 'pill'; } } };
          triggerFeedback(mockEl);
        }
      }
    }
  }

  // Bind to both .nav and #home-indicator-bar
  [bottomArea, indicatorBar].forEach(function(el) {
    el.addEventListener('touchstart', function(e) {
      var t = e.touches[0];
      handleStart(t.clientX, t.clientY);
    }, { passive: true });

    el.addEventListener('touchend', function(e) {
      var t = e.changedTouches[0];
      handleEnd(t.clientX, t.clientY);
    }, { passive: true });

    var isMouseDown = false;
    el.addEventListener('mousedown', function(e) {
      isMouseDown = true;
      handleStart(e.clientX, e.clientY);
    });

    document.addEventListener('mouseup', function(e) {
      if (!isMouseDown) return;
      isMouseDown = false;
      handleEnd(e.clientX, e.clientY);
    });
  });
})();

/* ─── INTERACTIVE FLUID DRAGGABLE HIGHLIGHTER (TELEGRAM/iOS STYLE) ─── */
(function() {
  var pillsContainer = document.querySelector('.nav-pills');
  var highlighter = document.getElementById('nav-highlighter');
  if (!pillsContainer || !highlighter) return;

  var isDragging = false;
  var startX = 0;
  var initialLeft = 0;
  var pillWidth = 0;
  var parentWidth = 0;
  var lastTickIndex = -1;
  var lastX = 0;
  var rAFActive = false;
  var initialIndex = 0;

  var tabsOrder = ['calc', 'pct', 'cur'];

  // SENIOR LEVEL: Robust multi-pointer coordinate parsing (prevents crash on finger release)
  function getX(e) {
    if (e.touches && e.touches.length > 0) {
      return e.touches[0].clientX;
    }
    if (e.changedTouches && e.changedTouches.length > 0) {
      return e.changedTouches[0].clientX;
    }
    return e.clientX;
  }

  function handleStart(e) {
    var activePill = document.querySelector('.pill.active');
    if (!activePill) return;

    var target = e.target;
    var clickedPillOrIndicator = false;
    while (target && target !== pillsContainer) {
      if (target === highlighter || target === activePill) {
        clickedPillOrIndicator = true;
        break;
      }
      target = target.parentElement;
    }

    if (!clickedPillOrIndicator) return;

    isDragging = true;
    startX = getX(e);
    lastX = startX;

    var parentRect = pillsContainer.getBoundingClientRect();
    var pillRect = activePill.getBoundingClientRect();
    
    initialLeft = pillRect.left - parentRect.left + 4;
    pillWidth = pillRect.width;
    parentWidth = parentRect.width;
    
    var pills = Array.prototype.slice.call(pillsContainer.querySelectorAll('.pill'));
    initialIndex = pills.indexOf(activePill);
    
    // SENIOR LEVEL: Set transform origin to left edge to support fluid hardware-accelerated scale animations
    highlighter.style.transformOrigin = 'left center';
    highlighter.style.transition = 'none';
    highlighter.classList.add('dragging');
    
    // Add global body dragging state to disable text selection and enforce cursor
    document.body.classList.add('dragging-tab');
  }

  function handleMove(e) {
    if (!isDragging) return;
    
    if (e.cancelable) e.preventDefault();
    lastX = getX(e);

    // Throttle style updates to refresh rate using requestAnimationFrame (120FPS ProMotion Friendly)
    if (!rAFActive) {
      rAFActive = true;
      requestAnimationFrame(updateDragPosition);
    }
  }

  function updateDragPosition() {
    if (!isDragging) {
      rAFActive = false;
      return;
    }

    var deltaX = lastX - startX;
    
    // SENIOR LEVEL: Elastic "Jelly" Stretch Math (pill stretches in the direction of drag)
    var stretch = Math.min(Math.abs(deltaX) * 0.16, 20); // liquid stretch factor
    var currentLeft = initialLeft + deltaX;

    // Clamp currentLeft inside the nav-pills boundaries
    var minLeft = 4;
    var maxLeft = parentWidth - pillWidth + 4;
    if (currentLeft < minLeft) currentLeft = minLeft;
    if (currentLeft > maxLeft) currentLeft = maxLeft;

    // Apply fluid size and transform matching Apple's physics engine
    var finalWidth = pillWidth + stretch;
    var finalLeft = currentLeft;
    if (deltaX > 0) {
      // Anchored to the left while extending right
      finalLeft = currentLeft - stretch * 0.15; 
    }

    // SENIOR LEVEL: 100% GPU composite layer scale animation (eliminates layout-thrashing reflows of style.width)
    var scaleFactor = finalWidth / pillWidth;
    highlighter.style.transform = 'translateX(' + finalLeft + 'px) scaleX(' + scaleFactor + ')';

    // SENIOR LEVEL: Intent-based active index calculation during drag (Telegram/Flutter style)
    var threshold = 35; // 35px drag threshold to prime the switch
    var closestIndex = initialIndex;
    if (Math.abs(deltaX) > threshold) {
      var direction = Math.sign(deltaX); // +1 = swipe right, -1 = swipe left
      var steps = Math.max(1, Math.round(Math.abs(deltaX) / pillWidth));
      closestIndex = initialIndex + (direction * steps);
    }
    if (closestIndex < 0) closestIndex = 0;
    if (closestIndex > 2) closestIndex = 2;

    // SENIOR LEVEL: Active text cross-fading & real-time glow previews
    var pills = pillsContainer.querySelectorAll('.pill');
    pills.forEach(function(pill, index) {
      if (pill.id === 'nb-theme') return;
      if (index === closestIndex) {
        pill.style.color = '#ff9500';
        pill.style.opacity = '1';
      } else {
        pill.style.color = 'var(--text-dim)';
        pill.style.opacity = '0.65';
      }
    });

    if (closestIndex !== -1 && closestIndex !== lastTickIndex) {
      if (navigator.vibrate) navigator.vibrate(2); // subtle mechanical tick
      lastTickIndex = closestIndex;
    }

    rAFActive = false;
  }

  function handleEnd(e) {
    if (!isDragging) return;
    isDragging = false;
    highlighter.classList.remove('dragging');
    document.body.classList.remove('dragging-tab');

    // Restore perfect ease-out snapping transition
    highlighter.style.transition = 'transform 0.28s cubic-bezier(0.25, 1, 0.5, 1), width 0.28s cubic-bezier(0.25, 1, 0.5, 1)';
    highlighter.style.transformOrigin = '';

    var finalX = getX(e);
    var deltaX = finalX - startX;
    
    // SENIOR LEVEL: Snapping mathematically based on drag intent threshold (Telegram/Flutter model)
    var threshold = 35; // 35px displacement triggers intent
    var targetIndex = initialIndex;

    if (Math.abs(deltaX) > threshold) {
      var direction = Math.sign(deltaX); // +1 = right, -1 = left
      var steps = Math.max(1, Math.round(Math.abs(deltaX) / pillWidth));
      targetIndex = initialIndex + (direction * steps);
    }

    if (targetIndex < 0) targetIndex = 0;
    if (targetIndex > 2) targetIndex = 2;
    
    var closestTab = tabsOrder[targetIndex];

    // Snap to target tab
    switchTab(closestTab);
    
    // CRITICAL: Always force update highlighter position to CSS calc percentages (even if switchTab returned early)
    updateNavHighlighter();
    
    lastTickIndex = -1;

    // Reset inline styling overrides to return styling control to static CSS
    var pills = pillsContainer.querySelectorAll('.pill');
    pills.forEach(function(pill) {
      if (pill.id === 'nb-theme') return;
      pill.style.color = '';
      pill.style.opacity = '';
      pill.style.transition = '';
    });
  }

  pillsContainer.addEventListener('touchstart', handleStart, { passive: false });
  window.addEventListener('touchmove', handleMove, { passive: false });
  window.addEventListener('touchend', handleEnd, { passive: true });

  pillsContainer.addEventListener('mousedown', handleStart);
  window.addEventListener('mousemove', handleMove);
  window.addEventListener('mouseup', handleEnd);
})();
